// Live-update email preview as user edits fulfillment form fields
function fulfillmentFieldChanged() {
  const panel = document.getElementById('fulfil-email-panel');
  const form  = document.querySelector('form[onsubmit*="fulfillment"]');
  if (!form) return;

  const fd  = Object.fromEntries(new FormData(form));
  const rec = {...(editSt['fulfillment']||{}), ...fd};

  // Auto-build tracking link from carrier + tracking number and fill form field
  const autoLink = buildTrackingUrl(fd.carrier, fd.trackingNumber);
  const trackingLinkInput = form.querySelector('[name="trackingLink"]');
  if (trackingLinkInput && autoLink && !trackingLinkInput.value) {
    trackingLinkInput.value = autoLink;
    rec.trackingLink = autoLink;
  } else if (trackingLinkInput && autoLink) {
    // Always update if carrier/tracking changed and current value looks auto-generated
    const currentVal = trackingLinkInput.value;
    const isAutoGenerated = currentVal.includes('tforcefreight.com') ||
      currentVal.includes('rlcarriers.com') || currentVal.includes('estes-express.com') ||
      currentVal.includes('mydaylight.dylt.com') || currentVal.includes('totaltransportation.com') || currentVal.includes('carrierlogistics.com') ||
      currentVal.includes('odfl.com') || currentVal.includes('ltl-xpo.com') ||
      currentVal.includes('forwardair.com') || currentVal.includes('daytonfreight.com') ||
      currentVal.includes('pittohio.com') || currentVal.includes('arcb.com') ||
      currentVal.includes('rrts.com') || currentVal.includes('oakharbor.com') ||
      currentVal.includes('suttontransport.com') || currentVal.includes('taxairfreight.com') ||
      currentVal.includes('magnumltl.com') || currentVal.includes('mve1.com') ||
      currentVal.includes('mydaylight.dylt.com') || currentVal.includes('totaltransportation.com') || currentVal.includes('carrierlogistics.com') ||
      currentVal.includes('dedicateddelivery.com') ||
      currentVal.includes('fedex.com/fedextrack') ||
      currentVal.includes('ups.com/track') || currentVal.includes('usps.com');
    if (isAutoGenerated) {
      trackingLinkInput.value = autoLink;
      rec.trackingLink = autoLink;
    }
  }

  // Auto-fill ship date with today when tracking number is first entered
  const shipDateInput = form.querySelector('[name="scheduledDate"]');
  if (shipDateInput && fd.trackingNumber && !shipDateInput.value) {
    shipDateInput.value = today();
    rec.scheduledDate = today();
  }

  if (!panel) return;

  const subj = rec.machineName
    ? `Your ${rec.machineName} Has Shipped!${rec.invNumber ? ' — INV #' + rec.invNumber : ''}`
    : 'Your Order Has Shipped!';
  const body = buildEmailPreview(rec);

  const subjEl = document.getElementById('fep-subj');
  const bodyEl = document.getElementById('fep-body');
  const toEl   = document.getElementById('fep-to');
  if (subjEl) subjEl.value = subj;
  if (bodyEl) bodyEl.value = body;
  if (toEl && fd.customerEmail) toEl.value = fd.customerEmail;
}

function sendTrackingEmail(rec) {
  const to      = (rec.customerEmail || '').trim();
  const machine = rec.machineName || 'your pinball machine';
  const subject = `Your ${machine} Has Shipped!${rec.invNumber ? ' — INV #' + rec.invNumber : ''}`;
  const body    = buildEmailPreview(rec);

  if (!to) { showToast('⚠️ No customer email on this record.', 'error'); return; }

  const gmailUrl = 'https://mail.google.com/mail/?view=cm'
    + '&to='   + encodeURIComponent(to)
    + '&su='   + encodeURIComponent(subject)
    + '&body=' + encodeURIComponent(body);

  // Use anchor click to avoid popup blockers
  const a = document.createElement('a');
  a.href = gmailUrl;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Stamp emailSentDate
  const sentDate = today();
  const idx = DB.fulfillment.findIndex(r => r.id === rec.id);
  if (idx !== -1) {
    DB.fulfillment[idx] = { ...DB.fulfillment[idx], emailSentDate: sentDate };
    const saleId = DB.fulfillment[idx].saleId;
    if (saleId) {
      const si = (DB.sales||[]).findIndex(s => s.id === saleId);
      if (si !== -1) DB.sales[si] = {...DB.sales[si], emailSentDate: sentDate};
      const so = (DB.sold||[]).findIndex(s => s.id === saleId);
      if (so !== -1) DB.sold[so] = {...DB.sold[so], emailSentDate: sentDate};
    }
    saveDB(); render();
  }
  showToast('✅ Gmail opened — email marked as sent.', 'success');
}

// ── INVOICE PDF AUTO-FILL (browser parser, no API needed) ────
async function extractInvoiceData(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('invoice-extract-status');
  const setStatus = (color, msg) => { if (status) { status.style.color = color; status.textContent = msg; } };
  setStatus('var(--yellow)', '⏳ Reading invoice…');

  try {
    // Load PDF.js from CDN if not already loaded
    if (!window.pdfjsLib) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // Read file as ArrayBuffer
    const arrayBuffer = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error('File read failed'));
      r.readAsArrayBuffer(file);
    });

    // Extract all text from PDF
    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      // Group items by y-position (PDF coords are bottom-up, same line items have same y)
      // Bucket y values to handle minor float variations on the same line
      const lineMap = new Map();
      for (const item of content.items) {
        if (!item.str || !item.str.trim()) continue;
        const y = Math.round(item.transform[5]); // round to nearest integer
        if (!lineMap.has(y)) lineMap.set(y, []);
        lineMap.get(y).push({ x: item.transform[4], str: item.str.trim() });
      }
      // Sort lines by y descending (PDF y=0 is bottom, so higher y = higher on page)
      const sortedYs = Array.from(lineMap.keys()).sort((a, b) => b - a);
      for (const y of sortedYs) {
        // Sort items on the same line by x position left-to-right
        const items = lineMap.get(y).sort((a, b) => a.x - b.x);
        fullText += items.map(i => i.str).join(' ') + '\n';
      }
    }
    console.log('=== PDF LINES ===\n' + fullText + '\n=== END ===');

    // Parse the extracted text using SDA invoice format
    const fields = parseSDAInvoice(fullText);

    // Populate the form
    const form = document.querySelector('form[onsubmit*="submitSale"]');
    if (!form) throw new Error('Sales form not found');

    const set = (name, val) => {
      if (!val) return;
      const el = form.querySelector(`[name="${name}"]`);
      if (el) el.value = val;
    };

    set('customerName',    fields.customerName);
    set('customerEmail',   fields.customerEmail);
    set('customerPhone',   fields.customerPhone);
    set('customerAddress', fields.customerAddress);
    set('customerCity',    fields.customerCity);
    set('customerState',   fields.customerState);
    set('customerZip',     fields.customerZip);
    set('machineName',     fields.machineName);
    set('invNumber',       fields.invNumber);
    set('salePrice',       fields.salePrice);
    set('saleDate',        fields.saleDate);
    set('paymentStatus',   fields.paymentStatus);
    set('notes',           fields.notes);

    // Also set address fields directly by ID (the addr-* IDs are separate from name attrs)
    const setId = (id, val) => { if (!val) return; const el = document.getElementById(id); if (el) el.value = val; };
    setId('addr-street', fields.customerAddress);
    setId('addr-city',   fields.customerCity);
    setId('addr-state',  fields.customerState);
    setId('addr-zip',    fields.customerZip);
    // Populate the address search bar with the full address so it's visible
    if (fields.customerAddress) {
      const fullAddr = [fields.customerAddress, fields.customerCity, fields.customerState, fields.customerZip].filter(Boolean).join(', ');
      setId('addr-full', fullAddr);
    }

    const filled = Object.values(fields).filter(v => v).length;
    setStatus('var(--green)', `✅ Filled ${filled} fields — review and save`);
    showToast(`✅ Invoice parsed — ${filled} fields filled!`);

  } catch(err) {
    console.error('Invoice parse error:', err);
    setStatus('var(--red)', '⚠️ ' + (err.message || 'Could not read PDF'));
    showToast('⚠️ Could not parse invoice', 'error');
  }
}

function parseSDAInvoice(rawText) {
  const fields = {};
  const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);
  const flat  = lines.join(' '); // full text as one string for fallback regex

  console.log('Parsed lines:', lines);

  // ── Invoice # ────────────────────────────────────────────────
  // Strategy 1: line after "Invoice #" contains "date number"
  for (let i = 0; i < lines.length; i++) {
    if (/Invoice\s*#/i.test(lines[i])) {
      // Check same line first: "Invoice # 1520"
      const same = lines[i].match(/Invoice\s*#\s*(\d{3,})/i);
      if (same) { fields.invNumber = same[1]; }
      // Check next line: "3/7/2026 1520"
      if (!fields.invNumber && i+1 < lines.length) {
        const next = lines[i+1].match(/(\d{1,2}\/\d{1,2}\/\d{4})\s+(\d{3,})/);
        if (next) {
          fields.invNumber = next[2];
          const p = next[1].split('/');
          fields.saleDate = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
        }
      }
      break;
    }
  }
  // Strategy 2: scan all lines for "date number" pattern near top
  if (!fields.invNumber) {
    for (const line of lines.slice(0, 10)) {
      const m = line.match(/^(\d{1,2}\/\d{1,2}\/\d{4})\s+(\d{3,})$/);
      if (m) {
        fields.invNumber = m[2];
        const p = m[1].split('/');
        fields.saleDate = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
        break;
      }
    }
  }

  // ── Date (if not found with invoice #) ──────────────────────
  if (!fields.saleDate) {
    // Look for standalone date line like "3/7/2026"
    for (const line of lines.slice(0, 15)) {
      const m = line.match(/^(\d{1,2}\/\d{1,2}\/\d{4})$/);
      if (m) {
        const p = m[1].split('/');
        fields.saleDate = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
        break;
      }
    }
  }

  // ── Bill To block ────────────────────────────────────────────
  // Find "Bill To" line then extract next few lines
  for (let i = 0; i < lines.length; i++) {
    if (/Bill\s+To/i.test(lines[i])) {
      // Collect lines until "Terms" or "Item Code" or empty-looking break
      const block = [];
      for (let j = i+1; j < Math.min(i+8, lines.length); j++) {
        if (/^(Terms|Ship\s+Via|Item\s+Code)/i.test(lines[j])) break;
        block.push(lines[j]);
      }

      // Each line may be "Value Value" (Bill To + Ship To side by side)
      // Dedup: if first half === second half, take first half
      const dedup = (line) => {
        if (!line) return '';
        const w = line.trim().split(/\s+/);
        const h = Math.floor(w.length / 2);
        if (h > 0 && w.slice(0,h).join(' ') === w.slice(h).join(' ')) return w.slice(0,h).join(' ');
        return line.trim();
      };

      // Name — first block line that doesn't look like an address or phone
      for (const bline of block) {
        const d = dedup(bline);
        if (!d) continue;
        // Skip if it looks like address (has number+street), phone, email, city/state
        if (/^\d+\s+\w/.test(d)) continue; // street address starts with number
        if (/^\d{3}[-.\s]\d{3}/.test(d)) continue; // phone
        if (/@/.test(d)) continue; // email
        if (/,\s*[A-Z]{2}\s+\d{5}/.test(d)) continue; // city,state zip
        if (!fields.customerName && d.length > 2) { fields.customerName = d; continue; }
        break;
      }

      // Address — line starting with a number (street number)
      for (const bline of block) {
        const d = dedup(bline);
        if (/^\d+\s+/.test(d) && !/,\s*[A-Z]{2}\s+\d{5}/.test(d)) {
          fields.customerAddress = d; break;
        }
      }

      // City/State/Zip — "City, ST 12345" or "City ST 12345" (with or without comma)
      for (const bline of block) {
        const d = dedup(bline);
        // With comma: "Fountain Hills, AZ 85268"
        const csz1 = d.match(/^(.+?),\s*([A-Z]{2})\s+(\d{5}(?:-\d{4})?)/);
        // Without comma: "Fountain Hills AZ 85268"
        const csz2 = d.match(/^(.+?)\s+([A-Z]{2})\s+(\d{5}(?:-\d{4})?)$/);
        const csz = csz1 || csz2;
        if (csz) { fields.customerCity=csz[1].trim(); fields.customerState=csz[2]; fields.customerZip=csz[3]; break; }
      }

      // Phone — standalone phone line
      for (const bline of block) {
        const d = dedup(bline);
        if (/^\(?\d{3}\)?[-.\s]\d{3}[-.\s]\d{4}$/.test(d)) { fields.customerPhone = d; break; }
      }

      // Email
      for (const bline of block) {
        const d = dedup(bline);
        if (/^[\w.+-]+@[\w-]+\.[a-z]{2,}$/i.test(d)) { fields.customerEmail = d; break; }
      }
      break;
    }
  }

  // ── Fallback: email/phone anywhere in text ───────────────────
  if (!fields.customerEmail) {
    const em = flat.match(/[\w.+-]+@[\w-]+\.[a-z]{2,}/i);
    if (em) fields.customerEmail = em[0];
  }
  if (!fields.customerPhone) {
    // Skip SDA's number
    const phones = [...flat.matchAll(/\b(\(?\d{3}\)?[-.\s]\d{3}[-.\s]\d{4})\b/g)].map(m=>m[1]);
    const notSDA = phones.find(p => !p.replace(/\D/g,'').startsWith('8582053788'));
    if (notSDA) fields.customerPhone = notSDA;
  }

  // ── Machine Name ─────────────────────────────────────────────
  let inItems = false;
  for (const line of lines) {
    if (/Item\s*Code/i.test(line)) { inItems = true; continue; }
    if (!inItems) continue;
    if (/^(shipping|deposit|discount|sales\s*tax|total|balance|payments)/i.test(line.trim())) continue;
    if (/[\d,]+\.\d{2}/.test(line)) {
      let name = line
        .replace(/\s+[\d,]+\.\d{2}T?\s+[\d,]+\.\d{2}T?\s*$/, '')  // strip both price cols
        .replace(/\s+[\d,]+\.\d{2}T?\s*$/, '')                       // strip single price
        .trim();
      // Strip item code prefix like "Raw Thrills Game " or "Stern Game "
      name = name.replace(/^[\w][\w\s\-]*?\bGame\b\s+/i, '').trim();
      // Also strip if first token is a known item code pattern (all caps word)
      name = name.replace(/^[A-Z]{2,}\s+[A-Z]{2,}\s+/, '').trim();
      if (name.length > 2) { fields.machineName = name; break; }
    }
  }

  // ── Balance Due ──────────────────────────────────────────────
  // Scan every line — "Balance Due $6,920.05" or "Balance Due" then next line has amount
  for (let i = 0; i < lines.length; i++) {
    if (/Balance\s*Due/i.test(lines[i])) {
      const same = lines[i].match(/Balance\s*Due\s+\$?([\d,]+\.\d{2})/i);
      if (same) {
        fields.salePrice = same[1].replace(/,/g,'');
        fields.paymentStatus = parseFloat(fields.salePrice) === 0 ? 'PIF' : 'PEND PYMN';
        break;
      }
      const next = (lines[i+1]||'').match(/^\$?([\d,]+\.\d{2})$/);
      if (next) {
        fields.salePrice = next[1].replace(/,/g,'');
        fields.paymentStatus = parseFloat(fields.salePrice) === 0 ? 'PIF' : 'PEND PYMN';
        break;
      }
    }
  }
  // Fallback to Total
  if (!fields.salePrice) {
    for (let i = 0; i < lines.length; i++) {
      if (/\bTotal\b/.test(lines[i]) && !/Sales\s*Tax/i.test(lines[i])) {
        const sm = lines[i].match(/Total\s+\$?([\d,]+\.\d{2})/i);
        if (sm) { fields.salePrice = sm[1].replace(/,/g,''); fields.paymentStatus = 'PEND PYMN'; break; }
        const nm = (lines[i+1]||'').match(/^\$?([\d,]+\.\d{2})$/);
        if (nm) { fields.salePrice = nm[1].replace(/,/g,''); fields.paymentStatus = 'PEND PYMN'; break; }
      }
    }
  }
  // Last resort — flat text
  if (!fields.salePrice) {
    const bm = flat.match(/Balance\s*Due\s+\$?([\d,]+\.\d{2})/i);
    if (bm) { fields.salePrice = bm[1].replace(/,/g,''); fields.paymentStatus = parseFloat(fields.salePrice)===0?'PIF':'PEND PYMN'; }
  }

  console.log('Parsed fields:', fields);
  return fields;
}

// ── WARRANTY CLAIMS ───────────────────────────────────────────
let wcEditing = null;

function genWarrantyPO(serialNumber) {
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const sn = (serialNumber||'XXXXX').toString().replace(/\s/g,'').toUpperCase();
  return `SDA-${sn}-${yy}${mm}${dd}`;
}

// Returns true if PO looks like an auto-generated value (should be replaced)
function wcPoIsAuto(poVal, serialNumber) {
  if (!poVal) return true;
  if (poVal.includes('XXXXX')) return true;
  // Matches SDA-{ANYTHINGNOSPACES}-{6digits} pattern
  return /^SDA-[A-Z0-9]+-\d{6}$/.test(poVal);
}

function wcSaleSearch(val) {
  if (!val) return;
  const allSales = [...(DB.sold||[]), ...(DB.sales||[])];
  const q = val.trim().toLowerCase();
  // Match against the full datalist label OR any individual field
  const match = allSales.find(r => {
    const label = ((r.machineName||'').toUpperCase()+' — '+(r.customerName||'')+(r.businessName?' · '+r.businessName:'')+(r.serialNumber?' · S/N '+r.serialNumber:'')).toLowerCase();
    return label === q
      || (r.customerName||'').toLowerCase().includes(q)
      || (r.businessName||'').toLowerCase().includes(q)
      || (r.serialNumber||'').toLowerCase().includes(q)
      || (r.machineName||'').toLowerCase().includes(q);
  });
  if (!match) return;
  wcAutoFillFromSaleById(match.id);
}

function wcAutoFillFromSaleById(saleId) {
  if (!saleId) return;
  const allSales = [...(DB.sold||[]), ...(DB.sales||[])];
  const sale = allSales.find(r => r.id === saleId);
  if (!sale) return;
  const setVal = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = val; };
  setVal('wc-gameName', sale.machineName||'');
  setVal('wc-serialNumber', sale.serialNumber||'');
  setVal('wc-shipToName', sale.customerName||'San Diego Amusements');
  const addr = [sale.customerAddress, sale.customerCity, sale.customerState, sale.customerZip].filter(Boolean).join(', ');
  setVal('wc-shipToAddress', addr || '8670 Miramar Rd #A, San Diego, CA 92126');
  setVal('wc-shipToPhone', sale.customerPhone||'858-205-3788');
  const linkEl = document.getElementById('wc-linkedSaleId');
  if (linkEl) linkEl.value = saleId;
  const poEl = document.getElementById('wc-poNumber');
  if (poEl) poEl.value = genWarrantyPO(sale.serialNumber);
  wcUpdateEmailPreview();
}

function wcAutoFillFromSale(selectEl) {
  const saleId = selectEl.value;
  if (!saleId) return;
  const allSales = [...(DB.sold||[]), ...(DB.sales||[])];

  if (!sale) return;
  const setVal = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = val; };
  setVal('wc-gameName', sale.machineName||'');
  setVal('wc-serialNumber', sale.serialNumber||'');
  setVal('wc-shipToName', sale.customerName||'San Diego Amusements');
  const addr = [sale.customerAddress, sale.customerCity, sale.customerState, sale.customerZip].filter(Boolean).join(', ');
  setVal('wc-shipToAddress', addr || '8670 Miramar Rd #A, San Diego, CA 92126');
  setVal('wc-shipToPhone', sale.customerPhone||'858-205-3788');
  // Store linked sale ID
  const linkEl = document.getElementById('wc-linkedSaleId');
  if (linkEl) linkEl.value = saleId;
  // Always update PO when auto-filling from sale (use actual serial)
  const poEl = document.getElementById('wc-poNumber');
  if (poEl) poEl.value = genWarrantyPO(sale.serialNumber);
  wcUpdateEmailPreview();

function wcSetShipTo(mode) {
  const modeInput = document.getElementById('wc-shipToMode');
  const nameEl    = document.getElementById('wc-shipToName');
  const addrEl    = document.getElementById('wc-shipToAddress');
  const phoneEl   = document.getElementById('wc-shipToPhone');

  if (!modeInput) return;

  if (btnCust) { btnCust.style.background = mode==='customer' ? 'var(--accent)' : 'transparent'; btnCust.style.color = mode==='customer' ? '#fff' : 'var(--muted)'; }
  if (btnSda)  { btnSda.style.background  = mode==='sda'      ? 'var(--accent)' : 'transparent'; btnSda.style.color  = mode==='sda'      ? '#fff' : 'var(--muted)'; }

  if (mode === 'sda') {

    if (addrEl)  addrEl.value  = SDA_ADDRESS.address;
    if (phoneEl) phoneEl.value = SDA_ADDRESS.phone;

    const form = modeInput.closest('form');

    const custAddr  = (form.querySelector('[name="customerAddress"]')?.value||'').trim();
    const custCity  = (form.querySelector('[name="customerCity"]')?.value||'').trim();

    const custZip   = (form.querySelector('[name="customerZip"]')?.value||'').trim();
    const custPhone = (form.querySelector('[name="customerPhone"]')?.value||'').trim();

function svcGenTicket() {
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const rand = Math.floor(Math.random()*9000)+1000;
  return `SVC-${yy}${mm}${dd}-${rand}`;
}

    : '<div class="panel" style="padding:0;overflow:hidden"><table><thead><tr><th>CUSTOMER</th><th>GAME</th><th>S/N</th><th>PROBLEM</th><th>PO #</th><th>PART</th><th>STATUS</th><th>EMAILED</th><th></th></tr></thead><tbody>' +
      claims.map(c =>
        '<tr>' +
        '<td style="font-size:12px">' + escH(c.customerName||'—') + '</td>' +
        '<td><div style="font-weight:700">' + escH(c.gameName||'—') + '</div><div style="font-size:11px;color:var(--muted)">' + escH(c.edition||'') + (c.claimType ? ' · '+c.claimType.replace('_',' ') : '') + '</div></td>' +
        '<td style="font-family:monospace;font-size:12px">' + escH(c.serialNumber||'—') + '</td>' +
        '<td style="max-width:140px;font-size:12px">' + escH((c.problem||'—').substring(0,60)) + ((c.problem||'').length>60?'…':'') + '</td>' +
        '<td style="font-family:monospace;font-size:11px;color:var(--muted)">' + escH(c.poNumber||'—') + '</td>' +
        '<td style="font-size:11px;max-width:110px">' + escH((c.partDesc||'—').substring(0,40)) + ((c.partDesc||'').length>40?'…':'') + '</td>' +
        '<td><span class="badge ' + (wcStatusBadge[c.status]||'bg-blue') + '">' + escH((c.status||'pending').replace('_',' ').toUpperCase()) + '</span></td>' +
        '<td style="font-size:11px;color:' + (c.emailSentDate?'var(--green)':'var(--muted)') + '">' + escH(c.emailSentDate||'—') + '</td>' +
        '<td><div style="display:flex;gap:5px">' +
          '<button class="btn sm warn" data-wc-id="' + c.id + '" onclick="wcEditing=DB.warrantyClaims.find(x=>x.id===this.dataset.wcId);render();window.scrollTo(0,0)">✏️ Edit</button>' +
          '<button class="btn sm danger" onclick="if(wcEditing&&wcEditing.id===\'' + c.id + '\')wcEditing=null;delRow(\'warrantyClaims\',\'' + c.id + '\')">✕</button>' +
        '</div></td>' +
        '</tr>'
      ).join('') +
      '</tbody></table></div>';

  return `
  <h1 class="pt">🛡️ Warranty Claims</h1>
  <div class="grid3" style="margin-bottom:18px">
    <div class="stat"><div class="sl">TOTAL CLAIMS</div><div class="sv" style="color:var(--accent)">${claims.length}</div></div>
    <div class="stat"><div class="sl">OPEN / PENDING</div><div class="sv" style="color:var(--yellow)">${open}</div></div>
    <div class="stat"><div class="sl">APPROVED</div><div class="sv" style="color:var(--green)">${approved}</div></div>
    <div class="stat"><div class="sl">RESOLVED</div><div class="sv" style="color:var(--purple)">${resolved}</div></div>
    <div class="stat"><div class="sl">DENIED</div><div class="sv" style="color:var(--red)">${denied}</div></div>
  </div>
  ${formHtml}
  <h3 class="st" style="margin-bottom:10px">CLAIMS HISTORY (${claims.length})</h3>
  ${tableHtml}`;
}

// Single delegated input listener — set up ONCE at init, never re-added
// This is the ONLY correct way to handle search in re-rendering apps
let _delegatedListenersReady = false;
function _setupDelegatedListeners() {
  if (_delegatedListenersReady) return;
  _delegatedListenersReady = true;
  document.addEventListener('input', function(e) {
    const id = e.target.id;
    if (id === 'inv-search-input') {
      invFilters.search = e.target.value;
      invPage = 0;
      renderInvTable();
    } else if (id === 'ps-search-input') {
      psSearch = e.target.value;
      renderPSTable();
    }
  });
}

// ── SYNC HELPERS ──────────────────────────────────────────────
let _lastSaveTime = 0;

function _updateLastSyncLabel() {
  const el = document.getElementById('last-sync-time');
  if (!el) return;
  const now = new Date();
  el.textContent = 'live • ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

async function forceSyncNow() {
  if (!window._fbUser) { alert('Not signed in.'); return; }
  setSyncStatus('loading', '⟳ Syncing…');
  try {
    const remote = await window._fbLoadAll();
    DB_COLLECTIONS.forEach(col => {
      if (remote[col] !== undefined) DB[col] = remote[col]; // remote is source of truth even if empty
    });
    ensureTables();
    saveLocal();
    render();
    _updateLastSyncLabel();
    setSyncStatus('saved', '✓ Live');
    setTimeout(() => setSyncStatus('idle'), 2000);
  } catch(e) {
    console.warn('[SDA] forceSyncNow error:', e);
    setSyncStatus('error','⚠ Sync failed');
  }
}

// ── AUTH-GATED APP STARTUP ─────────────────────────────────────
async function _startApp(user) {
  // Check allow-list (if configured)
  const allowed = window._fbAllowed || [];
  if (allowed.length > 0 && !allowed.includes(user.email)) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0c10;font-family:system-ui,sans-serif;color:#e8eaf0;text-align:center"><div><p style="font-size:32px">🚫</p><p style="margin-top:12px">Access denied for <strong>${user.email}</strong>.<br>Contact the admin to be added.</p><button onclick="window._fbSignOut()" style="margin-top:20px;background:#374151;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer">Sign out</button></div></div>`;
    return;
  }

  // Rebuild app shell (login screen may have replaced body)
  if (!document.getElementById('nav')) {
    document.body.innerHTML = `
    <aside>
      <div class="brand"><h1>Claude</h1><span>SDA PINBALL INVENTORY</span></div>
      <nav id="nav"></nav>
      <div class="sf">
        <div id="user-email" style="font-size:10px;color:#6b7280"></div>
        <button id="signout-btn" onclick="window._fbSignOut()" style="margin-top:6px;background:transparent;border:1px solid #1e2535;color:#6b7280;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit">Sign out</button>
      </div>
    </aside>
    <div class="main">
      <header>
        <div class="sw">
          <input type="text" id="gs" placeholder="🔍  Search machines, serials, customers…" oninput="doSearch(this.value)" onfocus="doSearch(this.value)" autocomplete="off">
          <div class="drop" id="sdrop"></div>
        </div>
        <span id="sync-status" style="font-size:11px;font-weight:700;white-space:nowrap"></span>
        <span id="last-sync-time" style="font-size:10px;color:var(--muted);white-space:nowrap"></span>
        <button onclick="forceSyncNow()" title="Pull latest data from server" style="font-size:11px;padding:3px 8px;background:var(--border);color:var(--text);border:1px solid var(--muted);border-radius:4px;cursor:pointer">🔄 Sync</button>
        <div class="dd" id="ddate" style="display:flex;align-items:center;gap:8px"><span id="ver-inline" style="font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.06em;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.35);border-radius:4px;padding:2px 6px">${typeof BUILD_VERSION!=='undefined'?BUILD_VERSION:'—'}</span></div>
      </header>
      <main id="mc"></main>
    </div>`;
    _delegatedListenersReady = false; // reset so listeners rebind on new DOM
  }
  const userEmailEl = document.getElementById('user-email');
  if (userEmailEl) userEmailEl.textContent = user.email;
  document.getElementById('nav').innerHTML = NAVS.map(([s,icon,label])=>`<button data-s="${s}" onclick="goto('${s}')" class="${s===section?'active':''}">${icon} ${label}</button>`).join('');
  _setupDelegatedListeners();
  ensureTables();
  render();
  await loadDB();
  ensureTables();
  shopifyDismissed = new Set((DB.shopifyDismissed || []).map(r => r.id || r));
  render();
}

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  // Register auth handler FIRST before anything else
  window._onAuthChange = async (user) => {
    if (user) {
      await _startApp(user);
    } else {
      _showLoginScreen();
    }
  };

  // If Firebase module hasn't loaded yet, wait for it
  if (!window._fbReady) {
    let waited = 0;
    while (!window._fbReady && waited < 5000) {
      await new Promise(r => setTimeout(r, 100));
      waited += 100;
    }
    if (!window._fbReady) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0c10;color:#ef4444;font-family:system-ui">Firebase failed to load. Check your internet connection and reload the page.</div>';
      return;
    }
  }

  // If onAuthStateChanged already fired before we set _onAuthChange, handle it now
  if (window._fbPendingAuthUser) {
    const { user } = window._fbPendingAuthUser;
    window._fbPendingAuthUser = null;
    await window._onAuthChange(user);
  } else if (!window._fbUser && window._fbReady) {
    // No auth event yet and not signed in — show login
    _showLoginScreen();
  }

  // init complete
}

document.addEventListener('DOMContentLoaded', init);
</script>
