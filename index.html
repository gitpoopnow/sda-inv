};

let _auth, _db, _provider, _firebaseAvailable = false;
try {
  if (typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
  firebase.initializeApp(FIREBASE_CONFIG);
  _auth     = firebase.auth();
  _db       = firebase.firestore();
  _provider = new firebase.auth.GoogleAuthProvider();
  _firebaseAvailable = true;
} catch(e) {
  console.warn('Firebase unavailable — local mode.', e.message);
  _auth = {
    onAuthStateChanged: (cb) => { setTimeout(() => cb(null), 0); return () => {}; },
    signInWithPopup: () => Promise.reject(new Error('Firebase unavailable')),
    signOut: () => Promise.resolve()
  };
  _db = null;
  _provider = null;
}

// ── AUTHORIZED USERS ──────────────────────────────────────────
const ALLOWED_EMAILS = [
  // 'you@gmail.com',
];

// ── COLLECTIONS ───────────────────────────────────────────────
// Each top-level key in DB gets its own Firestore collection.
// Records are stored as documents keyed by record.id
const DB_COLLECTIONS = ['inventory','parts','locations','pendingSales','sales','leads','service','wantList','fulfillment','sold','customers','warrantyClaims','shopifyDismissed'];

// Load all collections from Firestore in parallel
window._fbLoadAll = async () => {
  if (!_db) throw new Error('Firebase unavailable');
  const results = {};
  await Promise.all(DB_COLLECTIONS.map(async col => {
    const snap = await _db.collection(col).get();
    results[col] = snap.docs.map(d => d.data());
  }));
  return results;
};

// Save a single record to its collection
window._fbSaveRecord = async (col, record) => {
  if (!_db || !record || !record.id) return;
  await _db.collection(col).doc(record.id).set(record);
};

// Delete a single record
window._fbDeleteRecord = async (col, id) => {
  if (!_db) return;
  await _db.collection(col).doc(id).delete();
};

// Seed an entire collection using batched writes (max 500 per batch)
window._fbSeedCollection = async (col, records) => {
  if (!_db) return;
  const CHUNK = 499;
  for (let i = 0; i < records.length; i += CHUNK) {
    const batch = _db.batch();
    records.slice(i, i + CHUNK).forEach(r => {
      if (r && r.id) batch.set(_db.collection(col).doc(r.id), r);
    });
    await batch.commit();
  }
};

// Watch a single collection for real-time changes
window._fbWatchCollection = (col, cb) => {
  if (!_db) return () => {};
  return _db.collection(col).onSnapshot(
    snap => cb(col, snap.docs.map(d => d.data())),
    err => console.warn('[SDA] Firestore listener error:', col, err.code)
  );
};

window._fbSignIn   = () => _auth.signInWithPopup(_provider);
window._fbSignOut  = () => _auth.signOut();
window._fbAllowed  = ALLOWED_EMAILS;
window._fbReady    = true;

_auth.onAuthStateChanged(user => {
  window._fbUser = user;
  if (typeof window._onAuthChange === 'function') {
    window._onAuthChange(user);
  } else {
    window._fbPendingAuthUser = { resolved: true, user };
  }
});
</script>

// Tracks which collection+id combos need to be written to Firestore
const _saveQueue = {}; // { 'inventory::seed-1': {col, record} }
let _saveTimer = null;
let _fbWatchers = {};

async function loadDB() {
  // Show local data instantly
  const hasLocal = loadLocal();
  if (!hasLocal) {
    DB = JSON.parse(JSON.stringify(SEED));
    saveLocal();
  }
  ensureTables();
  render();

  if (!window._fbReady || !window._fbUser) {
    setSyncStatus('offline', '⚠ Not signed in');
    return;
  }

  setSyncStatus('loading', '⟳ Loading from cloud…');
  // Safety net: if stuck syncing for >20s, force status update
  const _syncTimeout = setTimeout(() => {
    if (syncStatus === 'loading') {
      setSyncStatus('saved', '✓ Live');
      render();
    }
  }, 20000);
  try {
    const remote = await window._fbLoadAll();
    // SEED_VERSION: bump this number to force a full re-seed from SEED data
    const SEED_VERSION = 2;
    const remoteSeedVer = remote._meta && remote._meta[0] ? remote._meta[0].seedVersion : 0;
    const isFirstRun = !remote.inventory || remote.inventory.length === 0;
    const needsReseed = isFirstRun || remoteSeedVer < SEED_VERSION;

    if (needsReseed) {
      // Seed or re-seed all collections to Firestore from SEED
      setSyncStatus('loading', '⟳ Syncing data to cloud…');
      const cols = ['inventory','parts','locations','pendingSales','sales','leads','service','wantList','fulfillment','sold','customers','warrantyClaims','shopifyDismissed'];
      for (const col of cols) {
        const records = SEED[col] || [];
        if (records.length > 0) {
          await window._fbSeedCollection(col, records);
        }
      }
      // Write meta version marker
      await window._fbSeedCollection('_meta', [{id:'version', seedVersion: SEED_VERSION}]);
      // DB already has seed data
    } else {
      // Load everything from Firestore
      const cols = ['inventory','parts','locations','pendingSales','sales','leads','service','wantList','fulfillment','sold','customers','warrantyClaims','shopifyDismissed'];
      cols.forEach(col => {
        if (remote[col] !== undefined) DB[col] = remote[col]; // remote is source of truth even if empty
      });
    }

    ensureTables();
    saveLocal();
    clearTimeout(_syncTimeout);
    setSyncStatus('saved', '✓ Live');
    _updateLastSyncLabel();
    render();
    _startRealTimeWatch();
  } catch(e) {
    clearTimeout(_syncTimeout);
    console.warn('[SDA] Firestore load error:', e);
    setSyncStatus('offline', '⚠ Offline — using local data');
  }
}

// ── Cross-tab sync via BroadcastChannel ──────────────────────
// When this tab saves to Firestore, broadcast to other open tabs so they
// reload from localStorage immediately without waiting for onSnapshot
let _syncChannel = null;
try {
  _syncChannel = new BroadcastChannel('sda_sync');
  _syncChannel.onmessage = (e) => {
    if (e.data === 'reload' && Date.now() - _lastSaveTime > 2000) {
      loadLocal();
      ensureTables();
      render();
      _updateLastSyncLabel();
      console.log('[SDA] Cross-tab sync received');
    }
  };
} catch(e) { /* BroadcastChannel not supported */ }

function _notifyOtherTabs() {
  try { if (_syncChannel) _syncChannel.postMessage('reload'); } catch(e) {}
}

// ── REAL-TIME LISTENERS (per collection) ──────────────────────
function _startRealTimeWatch() {
  const cols = ['inventory','parts','locations','pendingSales','sales','leads','service','wantList','fulfillment','sold','customers','warrantyClaims','shopifyDismissed'];
  cols.forEach(col => {
    if (_fbWatchers[col]) return;
    _fbWatchers[col] = window._fbWatchCollection(col, (c, records) => {
      if (Date.now() - _lastSaveTime < 5000) return; // skip echo of our own save
      const anyInputFocused = document.activeElement &&
        ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
      if (anyInputFocused) return;
      DB[c] = records;
      ensureTables();
      saveLocal();
      render();
      _updateLastSyncLabel();
      _notifyOtherTabs();
    });
  });
}

// ── SAVE TO FIREBASE ─────────────────────────────────────────
function saveDB(col, id) {
  saveLocal();
  _lastSaveTime = Date.now();
  if (!window._fbReady || !window._fbUser) {
    setSyncStatus('saved', '✓ Saved locally');
    return;
  }
  if (col && id) {
    // Queue specific record
    const record = (DB[col] || []).find(r => r.id === id);
    if (record) _saveQueue[col + '::' + id] = { col, record };
  } else {
    // No specific record — queue everything (used by complex operations)
    const cols = ['inventory','parts','locations','pendingSales','sales','leads','service','wantList','fulfillment','sold','shopifyDismissed'];
    cols.forEach(c => {
      (DB[c] || []).forEach(r => {
        if (r && r.id) _saveQueue[c + '::' + r.id] = { col: c, record: r };
      });
    });
  }
  clearTimeout(_saveTimer);
  setSyncStatus('saving', '⟳ Saving…');
  _saveTimer = setTimeout(pushToDB, 1500);
}

async function pushToDB() {
  const items = Object.values(_saveQueue);
  if (!items.length) return;
  Object.keys(_saveQueue).forEach(k => delete _saveQueue[k]);
  try {
    await Promise.all(items.map(({ col, record }) => window._fbSaveRecord(col, record)));
    setSyncStatus('saved', '✓ Live');
    _updateLastSyncLabel();
    _notifyOtherTabs();
    setTimeout(() => setSyncStatus('idle'), 3000);
  } catch(e) {
    console.warn('[SDA] Firestore save error:', e);
    setSyncStatus('error', '⚠ Save failed — retrying…');
    // Re-queue failed items and retry
    items.forEach(item => { _saveQueue[item.col + '::' + item.record.id] = item; });
    _saveTimer = setTimeout(pushToDB, 5000);
  }
}

function addRow(t,r) { const rec={id:uid(),createdAt:today(),updatedAt:new Date().toISOString(),...r}; DB[t].unshift(rec); saveDB(t,rec.id); render(); }
function updateRow(t,id,r) { DB[t]=DB[t].map(x=>x.id===id?{...x,...r,updatedAt:new Date().toISOString()}:x); saveDB(t,id); render(); }
function delRow(t,id) {
  if(!confirm('Delete this record?'))return;
  // CASCADE: If deleting an inventory item, clean up all linked records
  if (t === 'inventory') {
    const linkedSales = (DB.sales||[]).filter(s => s.inventoryId === id);
    linkedSales.forEach(s => { DB.fulfillment = (DB.fulfillment||[]).filter(f => f.saleId !== s.id); });
    DB.sales = (DB.sales||[]).filter(s => s.inventoryId !== id);
    const linkedSold = (DB.sold||[]).filter(s => s.inventoryId === id);
    linkedSold.forEach(s => { DB.fulfillment = (DB.fulfillment||[]).filter(f => f.saleId !== s.id); });
    DB.sold = (DB.sold||[]).filter(s => s.inventoryId !== id);
    DB.fulfillment = (DB.fulfillment||[]).filter(f => f.inventoryId !== id);
  }
  // CASCADE: If deleting a sale, clean up fulfillment and restore inventory
  if (t === 'sales') {
    const sale = (DB.sales||[]).find(s => s.id === id);
    if (sale) {
      DB.fulfillment = (DB.fulfillment||[]).filter(f => f.saleId !== id);
      const invItem = sale.inventoryId ? (DB.inventory||[]).find(i => i.id === sale.inventoryId) : null;
      if (invItem) {
        const idx = DB.inventory.findIndex(i => i.id === invItem.id);
        if (idx !== -1) DB.inventory[idx] = {...invItem, status: 'in_stock', dateSold: ''};
      }
    }
  }
  // CASCADE: If deleting a sold record directly, clean up fulfillment and restore inventory
  if (t === 'sold') {
    const sold = (DB.sold||[]).find(s => s.id === id);
    if (sold) {
      DB.fulfillment = (DB.fulfillment||[]).filter(f => f.saleId !== id);
      const invItem = sold.inventoryId ? (DB.inventory||[]).find(i => i.id === sold.inventoryId) : null;
      if (invItem) {
        const idx = DB.inventory.findIndex(i => i.id === invItem.id);
        if (idx !== -1) DB.inventory[idx] = {...invItem, status: 'in_stock', dateSold: ''};
      }
    }
  }
  DB[t]=DB[t].filter(x=>x.id!==id);
  saveLocal();
  render();
  // Delete from Firestore
  if (window._fbReady && window._fbUser && window._fbDeleteRecord) {
    window._fbDeleteRecord(t, id).catch(e => console.warn('[SDA] delete error:', e));
  }
}

function findInventoryMatch(machineName, serialNumber, statusFilter) {
  const inv = DB.inventory || [];
  const filter = statusFilter || 'in_stock';
  if (serialNumber && serialNumber.trim()) {
    const sn = serialNumber.trim();
    const bySerial = inv.find(i => i.serialNumber === sn && i.status === filter)
                  || inv.find(i => i.serialNumber === sn);
    if (bySerial) return bySerial;
  }
  if (machineName && machineName.trim()) {
    const mn = machineName.toLowerCase().trim();
    const byName = inv.find(i => i.status === filter && (i.machineName||'').toLowerCase().trim() === mn);
    if (byName) return byName;
    const fuzzy = inv.find(i => i.status === filter &&
      ((i.machineName||'').toLowerCase().includes(mn) || (i.machineName||'').toLowerCase().trim().split(' ').some(w => w.length > 3 && mn.includes(w))));
    if (fuzzy) return fuzzy;
  }
  return null;
}

        (sale.serialNumber && i.serialNumber === sale.serialNumber) ||
        (i.machineName && sale.machineName && i.machineName.toLowerCase().trim() === sale.machineName.toLowerCase().trim())
      );
  if (invItem) {
    const idx = DB.inventory.findIndex(i => i.id === invItem.id);
    if (idx !== -1) DB.inventory[idx] = {...invItem, status: 'in_stock', dateSold: ''};
  }
  saveDB(); render();
}

// ── PAGINATION ────────────────────────────────────────────────
let invPage=0, salePage=0, partsPage=0;
let fulTab = 'pending';
let svcEditing = null;
let svcTab = 'pending';
const PER = 9999;
function paginate(rows, page) {
  const total = rows.length;
  const pages = Math.ceil(total/PER)||1;
  const p = Math.max(0,Math.min(page,pages-1));
  return { rows: rows.slice(p*PER,(p+1)*PER), page:p, pages, total };
}
function pgHtml(page, pages, total, setter) {
  if(pages<=1) return `<div class="pg"><span>${total} records</span></div>`;
  let btns = '';
  for(let i=0;i<pages;i++) btns += `<button class="${i===page?'cur':''}" onclick="${setter}(${i});render()">${i+1}</button>`;
  return `<div class="pg">${btns}<span>${total} records</span></div>`;
}

  (DB.sold||[]).forEach(r=>{if((r.machineName||'').toLowerCase().includes(t)||(r.customerName||'').toLowerCase().includes(t)||(r.businessName||'').toLowerCase().includes(t))hits.push({label:r.machineName,sub:`${r.customerName||''} · Sold`,s:'sold'});});

  (DB.service||[]).forEach(r=>{if((r.customerName||'').toLowerCase().includes(t)||(r.machineName||'').toLowerCase().includes(t)||(r.issue||'').toLowerCase().includes(t))hits.push({label:r.machineName||r.customerName,sub:`${r.issue||''} · Service`,s:'service'});});
  (DB.fulfillment||[]).forEach(r=>{if((r.customerName||'').toLowerCase().includes(t)||(r.machineName||'').toLowerCase().includes(t))hits.push({label:r.machineName||'',sub:`${r.customerName||''} · Fulfillment`,s:'fulfillment'});});

function saleBuildSerialOptions(machineName, selectedSerial) {
  const mn = (machineName||'').toLowerCase().trim();
  const matches = mn ? (DB.inventory||[]).filter(i =>
    i.status !== 'sold' &&
    (i.machineName||'').toLowerCase().trim() === mn
  ) : [];
  let opts = '<option value="">— Select serial —</option>';
  opts += '<option value="TBD"' + (selectedSerial==='TBD'?' selected':'') + '>⏳ TBD — assign later</option>';
  matches.forEach(i => {
    const label = i.serialNumber ? `SN: ${i.serialNumber}` : `(no serial)`;
    const sub = i.location ? ` · ${i.location}` : '';
    const sel = (selectedSerial && selectedSerial === i.serialNumber) || (!selectedSerial && matches.length===1) ? ' selected' : '';
    opts += `<option value="${i.id}" data-serial="${i.serialNumber||''}"${sel}>${label}${sub} · ${i.status}</option>`;
  });
  if (!mn) opts = '<option value="">— Pick a game first —</option>';
  return opts;
}

function saleTitleSearch() {
  const inp = document.getElementById('pi-sale-title');
  const drop = document.getElementById('pd-sale-title');
  if(!inp||!drop) return;
  const q = inp.value.toLowerCase().trim();
  // Deduplicate by title for the dropdown
  const allActive = (DB.inventory||[]).filter(i => i.status !== 'sold');
  const seen = new Set();
  const titles = allActive.filter(i => {
    const mn = (i.machineName||'').toLowerCase();
    if (!q || mn.includes(q)) {
      if (!seen.has(mn)) { seen.add(mn); return true; }
    }
    return false;
  });
  if(!titles.length){drop.classList.remove('open');return;}
  drop.innerHTML = titles.slice(0,20).map(g => {
    const count = allActive.filter(i=>(i.machineName||'').toLowerCase().trim()===(g.machineName||'').toLowerCase().trim()).length;
    return `<div class="pi" onclick="onSaleTitleSelect('${g.machineName.replace(/'/g,"\\'")}')" >
      <span class="pi-name">${g.machineName}</span>
      <span class="pi-ser">${count} unit${count!==1?'s':''} in stock</span>
    </div>`;
  }).join('');
  drop.classList.add('open');
}

function onSaleTitleSelect(machineName) {
  const inp = document.getElementById('pi-sale-title');
  if(inp) inp.value = machineName;
  document.getElementById('pd-sale-title')?.classList.remove('open');
  // Rebuild serial dropdown for this title
  const sel = document.getElementById('sale-serial-select');
  if(sel) sel.innerHTML = saleBuildSerialOptions(machineName, '');
  // Auto-select if only one option
  const sel2 = document.getElementById('sale-serial-select');
  // Auto-select serial if only one real (non-TBD) option
  if(sel2) { const realOpts = Array.from(sel2.options).filter(o=>o.value&&o.value!=="TBD"); if(realOpts.length===1) { sel2.value=realOpts[0].value; } }
  onSerialSelectChange();
}

function onSerialSelectChange() {
  const sel = document.getElementById('sale-serial-select');
  const serialHidden = document.getElementById('sale-serial');
  const invIdHidden = document.getElementById('sale-inv-id');
  if(!sel) return;
  const val = sel.value;
  if(val === '' || val === 'TBD') {
    if(serialHidden) serialHidden.value = val === 'TBD' ? 'TBD' : '';
    if(invIdHidden) invIdHidden.value = '';
  } else {
    // val is an inventory ID
    const inv = (DB.inventory||[]).find(i => i.id === val);
    if(serialHidden) serialHidden.value = inv ? (inv.serialNumber||'') : '';
    if(invIdHidden) invIdHidden.value = val;
  }
}

function submitInv(e) {
  e.preventDefault();
  const r=Object.fromEntries(new FormData(e.target));
  if(invEditing){
    // ── INVENTORY → SALES + SOLD + FULFILLMENT sync ──
    // If machine name or serial changed, propagate to all linked records
    const oldName = invEditing.machineName||'';
    const oldSerial = invEditing.serialNumber||'';
    const nameChanged = r.machineName !== oldName;
    const serialChanged = r.serialNumber !== oldSerial;
    const invId = invEditing.id;
    if (nameChanged || serialChanged) {
      // Update linked sales
      const _ts = new Date().toISOString();
      (DB.sales||[]).forEach((s,i) => {
        if (s.inventoryId === invId) {
          if (nameChanged) DB.sales[i] = {...s, machineName: r.machineName, updatedAt: _ts};
          if (serialChanged) DB.sales[i] = {...DB.sales[i], serialNumber: r.serialNumber, updatedAt: _ts};
        }
      });
      // Update linked sold records
      (DB.sold||[]).forEach((s,i) => {
        if (s.inventoryId === invId) {
          if (nameChanged) DB.sold[i] = {...s, machineName: r.machineName, updatedAt: _ts};
          if (serialChanged) DB.sold[i] = {...DB.sold[i], serialNumber: r.serialNumber, updatedAt: _ts};
        }
      });
      // Update linked fulfillment records
      (DB.fulfillment||[]).forEach((f,i) => {
        if (f.inventoryId === invId) {
          if (nameChanged) DB.fulfillment[i] = {...f, machineName: r.machineName, updatedAt: _ts};
          if (serialChanged) DB.fulfillment[i] = {...DB.fulfillment[i], serialNumber: r.serialNumber, updatedAt: _ts};
        }
      });
    }
    invEditing=null;
    updateRow('inventory',invId,r);
  } else {
    // ── BULK ADD ──────────────────────────────────────────────
    const qty = Math.min(Math.max(parseInt(r.bulkQty)||1, 1), 500);
    delete r.bulkQty;
    if (qty === 1) {
      addRow('inventory', r);
    } else {
      // Add qty records; serial number and location intentionally left blank per-unit
      const baseName    = r.machineName;
      const baseSerial  = r.serialNumber || '';
      const baseLocation= r.location     || '';
      for (let i = 0; i < qty; i++) {
        const rec = {
          ...r,
          machineName:  baseName,
          serialNumber: baseSerial,   // user will fill in later
          location:     baseLocation, // user will fill in later
        };
        const newRec = {id:uid(), createdAt:today(), updatedAt:new Date().toISOString(), ...rec};
        DB['inventory'].unshift(newRec);
        // Save each to Firestore async (don't await to keep it fast)
        window._fbSaveRecord && window._fbSaveRecord('inventory', newRec);
      }
      saveLocal();
      render();
      // Brief toast
      const toast = document.createElement('div');
      toast.textContent = `✅ Added ${qty}× ${baseName} to inventory`;
      toast.style.cssText = 'position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;font-weight:700;font-size:13px;padding:10px 22px;border-radius:10px;z-index:99999;box-shadow:0 4px 18px rgba(0,0,0,.5);pointer-events:none';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  }
}

function upsertCustomer(r) {
  if (!r.customerName || !r.customerName.trim()) return;
  const key = r.customerName.trim().toLowerCase();
  const fields = ['customerName','businessName','customerEmail','customerPhone',
                  'customerAddress','customerCity','customerState','customerZip','customerType','liftgate'];
  const data = {};
  fields.forEach(f => { if (r[f]) data[f] = r[f]; });
  if (!DB.customers) DB.customers = [];
  const idx = DB.customers.findIndex(c => (c.customerName||'').trim().toLowerCase() === key);
  if (idx !== -1) {
    DB.customers[idx] = { ...DB.customers[idx], ...data };
  } else {
    DB.customers.push({ id: uid(), ...data, createdAt: today() });
  }
}

function getSaleCustomers() {
  const seen = new Map();
  // Pull from sales, sold, AND the dedicated customers table
  [...(DB.sales||[]), ...(DB.sold||[]), ...(DB.customers||[])].forEach(r => {
    if (r.customerName && r.customerName.trim()) {
      const key = r.customerName.trim().toLowerCase();
      if (!seen.has(key)) seen.set(key, r);
    }
  });
  return Array.from(seen.values());
}
function autofillCustomer(name, inputEl) {
  const customers = getSaleCustomers();
  const match = customers.find(c => c.customerName.trim().toLowerCase() === name.trim().toLowerCase());
  if (!match) return;
  const fields = ['businessName','customerEmail','customerPhone','customerAddress','customerCity','customerState','customerZip','customerType','liftgate'];
  // Find the nearest form or fallback to #sale-form
  const form = (inputEl && inputEl.closest('form')) || document.getElementById('sale-form');
  if (!form) return;
  fields.forEach(f => {
    const el = form.querySelector('[name="'+f+'"]');
    if (el && match[f]) el.value = match[f];
  });
  // If this is the warranty form, sync ship-to after autofill
  if (typeof wcSyncShipToFromCustomer === 'function') wcSyncShipToFromCustomer();
}
// ── ADDRESS AUTOCOMPLETE (Nominatim / OpenStreetMap — free, no key) ──────────
// Type → see results → click or Tab to fill. Paste full address → auto-fills.
let _addrTimer = null;
const _addrState = {};

// Self-initializing: reads data-* attributes from the input, no separate init needed
function _addrCfg(inputId) {
  if (_addrState[inputId]) return _addrState[inputId];
  const inp = document.getElementById(inputId);
  if (!inp) return null;
  _addrState[inputId] = {
    streetId: inp.dataset.street, cityId: inp.dataset.city,
    stateId: inp.dataset.state, zipId: inp.dataset.zip,
    results: [], sel: -1
  };
  return _addrState[inputId];
}

function _addrSet(id, v) { const el = document.getElementById(id); if (el) el.value = v || ''; }

function addrFill(inputId, idx) {
  const cfg = _addrCfg(inputId);
  if (!cfg || !cfg.results[idx]) return;
  const r = cfg.results[idx], a = r.address || {};
  _addrSet(cfg.streetId, [a.house_number, a.road].filter(Boolean).join(' ') || r.display_name.split(',')[0].trim());
  _addrSet(cfg.cityId, a.city||a.town||a.village||a.municipality||a.suburb||a.county||'');
  _addrSet(cfg.stateId, a.state||a.region||a.state_district||'');
  _addrSet(cfg.zipId, a.postcode||'');
  _addrSet(inputId, '');
  const drop = document.getElementById(inputId+'-drop');
  if (drop) drop.style.display = 'none';
}

function addrSearch(inputId) {
  const cfg = _addrCfg(inputId);
  const inp = document.getElementById(inputId);
  if (!cfg || !inp) return;
  const val = inp.value.trim();
  clearTimeout(_addrTimer);
  const drop = document.getElementById(inputId+'-drop');
  if (val.length < 3) { if (drop) drop.style.display = 'none'; return; }
  _addrTimer = setTimeout(async () => {
    _addrShowDrop(inputId, '<div style="padding:10px 14px;color:var(--yellow);font-size:12px">\u27f3 Searching…</div>');
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&countrycodes=us&limit=7&q=${encodeURIComponent(val)}`;
      const res = await fetch(url, { headers: { 'User-Agent':'SDA-Pinball/1.0', 'Accept-Language':'en-US,en' } });
      const data = await res.json();
      cfg.results = data || []; cfg.sel = -1;
      if (!data || !data.length) {
        // Best-effort: parse whatever was typed and populate fields
        const p = _addrParse(val);
        _addrSet(cfg.streetId, p.street || val);
        if (p.city)  _addrSet(cfg.cityId,  p.city);
        if (p.state) _addrSet(cfg.stateId, p.state);
        if (p.zip)   _addrSet(cfg.zipId,   p.zip);
        _addrSet(inputId, '');
        const d = document.getElementById(inputId+'-drop');
        if (d) d.style.display = 'none';
        return;
      }
      _addrShowDrop(inputId, data.slice(0,7).map((r,i) => {
        const a = r.address||{};
        const st = [a.house_number,a.road].filter(Boolean).join(' ')||r.display_name.split(',')[0].trim();
        const ci = a.city||a.town||a.village||a.municipality||a.county||'';
        const sa = a.state||a.region||'';
        const zp = a.postcode||'';
        return `<div onmousedown="addrFill('${inputId}',${i})" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--panel)'" onmouseout="this.style.background=''">
          <div style="font-weight:600;font-size:13px">${st||r.display_name.split(',')[0]}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${[ci,sa,zp].filter(Boolean).join(' \u00b7 ')}</div>
        </div>`;
      }).join(''));
    } catch(e) {
      _addrShowDrop(inputId, '<div style="padding:10px 14px;color:var(--muted);font-size:12px">Search unavailable \u2014 fill manually</div>');
    }
  }, 600);
}

function _addrShowDrop(inputId, html) {
  let drop = document.getElementById(inputId+'-drop');
  if (!drop) {
    drop = document.createElement('div');
    drop.id = inputId+'-drop';
    drop.style.cssText = 'position:fixed;z-index:99999;background:var(--panel2);border:1px solid var(--accent);border-radius:10px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.7);max-height:300px;overflow-y:auto';
    document.body.appendChild(drop);
  }
  const inp = document.getElementById(inputId);
  if (inp) { const r=inp.getBoundingClientRect(); drop.style.left=r.left+'px'; drop.style.top=(r.bottom+4)+'px'; drop.style.width=Math.max(r.width,340)+'px'; }
  drop.innerHTML = html;
  drop.style.display = 'block';
}

function addrKey(e, inputId) {
  const cfg = _addrCfg(inputId);
  if (!cfg) return;
  if (e.key==='Escape') { const d=document.getElementById(inputId+'-drop'); if(d)d.style.display='none'; return; }
  if (!cfg.results.length) return;
  if (e.key==='ArrowDown') { e.preventDefault(); cfg.sel=Math.min(cfg.sel+1,cfg.results.length-1); _addrHL(inputId); }
  else if (e.key==='ArrowUp') { e.preventDefault(); cfg.sel=Math.max(cfg.sel-1,0); _addrHL(inputId); }
  else if (e.key==='Tab'||e.key==='Enter') { e.preventDefault(); addrFill(inputId, cfg.sel>=0?cfg.sel:0); }
}

function _addrHL(inputId) {
  const cfg=_addrCfg(inputId); const drop=document.getElementById(inputId+'-drop');
  if(!drop||!cfg) return;
  drop.querySelectorAll('div[onmousedown]').forEach((el,i)=>{ el.style.background=i===cfg.sel?'var(--panel)':''; });
}

function addrPaste(inputId) {
  setTimeout(()=>{
    const cfg=_addrCfg(inputId); const inp=document.getElementById(inputId);
    if(!cfg||!inp) return;
    const val=inp.value.trim();
    if (!val) return;
    if (val.includes(',') && val.length>=10) {
      const p=_addrParse(val);
      if(p.street) {
        _addrSet(cfg.streetId,p.street); _addrSet(cfg.cityId,p.city);
        _addrSet(cfg.stateId,p.state); _addrSet(cfg.zipId,p.zip);
        _addrSet(inputId,'');
        const d=document.getElementById(inputId+'-drop'); if(d)d.style.display='none';
        return;
      }
    }
    addrSearch(inputId);
  },50);
}

function _addrParse(val) {
  const parts = val.split(',').map(s=>s.trim()).filter(Boolean);
  if (parts.length>=3) {
    const last=parts[parts.length-1];
    const m=last.match(/^([A-Za-z\s]+?)\s*(\d{5}(?:-\d{4})?)?$/);
    return { street:parts.slice(0,-2).join(', '), city:parts[parts.length-2], state:m?m[1].trim():last, zip:m&&m[2]?m[2]:'' };
  }
  if (parts.length===2) {
    const m=parts[1].match(/^([A-Za-z\s]+?)\s*(\d{5}(?:-\d{4})?)?$/);
    return { street:parts[0], city:'', state:m?m[1].trim():parts[1], zip:m&&m[2]?m[2]:'' };
  }
  return { street:val, city:'', state:'', zip:'' };
}

function _normalizeAddrRec(rec) {
  if (!rec) return rec;
  const addr=rec.customerAddress||'';
  if (addr && addr.includes(',') && !(rec.customerCity||'').trim()) {
    const p=_addrParse(addr);
    if (p.city||p.state) return {...rec, customerAddress:p.street||addr, customerCity:rec.customerCity||p.city, customerState:rec.customerState||rec.state||p.state, customerZip:rec.customerZip||p.zip};
  }
  return rec;
}
function _splitAddrRec(rec) {
  return { street:rec.customerAddress||'', city:rec.customerCity||'', state:rec.customerState||rec.state||'', zip:rec.customerZip||'' };
}

function confirmAssignSerial(saleId, invId, el) {
  const sale = (DB.sales||[]).find(s => s.id === saleId);
  const inv = (DB.inventory||[]).find(i => i.id === invId);
  if (!sale || !inv) return;
  // Link the inventory item
  const sidx = DB.sales.findIndex(s => s.id === saleId);
  if (sidx !== -1) DB.sales[sidx] = {...sale, inventoryId: invId, serialNumber: inv.serialNumber||sale.serialNumber||''};
  // Mark inventory as reserved
  const iidx = DB.inventory.findIndex(i => i.id === invId);
  if (iidx !== -1) DB.inventory[iidx] = {...inv, status: 'reserved'};
  // Update linked fulfillment
  const fulIdx = (DB.fulfillment||[]).findIndex(f => f.saleId === saleId);
  if (fulIdx !== -1) DB.fulfillment[fulIdx] = {...DB.fulfillment[fulIdx], inventoryId: invId, serialNumber: inv.serialNumber||sale.serialNumber||'', machineName: inv.machineName||sale.machineName};
  saveDB();
  document.getElementById('assign-serial-modal')?.remove();
  showToast(`✅ ${inv.machineName} (SN: ${inv.serialNumber||'—'}) assigned to ${sale.customerName||'sale'}`);
  render();
}

function confirmAssignManual(saleId) {
  const serial = (document.getElementById('manual-serial-input')?.value||'').trim();
  if (!serial) { showToast('Please enter a serial number', 'error'); return; }
  const sale = (DB.sales||[]).find(s => s.id === saleId);
  if (!sale) return;
  // Try to find matching inventory by serial
  const inv = (DB.inventory||[]).find(i => i.serialNumber === serial);
  const sidx = DB.sales.findIndex(s => s.id === saleId);
  if (sidx !== -1) DB.sales[sidx] = {...sale, serialNumber: serial, inventoryId: inv ? inv.id : sale.inventoryId};
  if (inv) {
    const iidx = DB.inventory.findIndex(i => i.id === inv.id);
    if (iidx !== -1) DB.inventory[iidx] = {...inv, status: 'reserved'};
  }
  const fulIdx = (DB.fulfillment||[]).findIndex(f => f.saleId === saleId);
  if (fulIdx !== -1) DB.fulfillment[fulIdx] = {...DB.fulfillment[fulIdx], serialNumber: serial, inventoryId: inv ? inv.id : DB.fulfillment[fulIdx].inventoryId};
  saveDB();
  document.getElementById('assign-serial-modal')?.remove();

}

function moveToSold(r) {
  // Look up cost from inventory — use inventoryId first, fallback to serial/name
  const invRef = r.inventoryId

    : findInventoryMatch(r.machineName, r.serialNumber, 'reserved') || findInventoryMatch(r.machineName, r.serialNumber, 'in_stock');

  const cost = r.cost || (invRef ? invRef.cost : '') || '';
  const margin = (r.salePrice && cost) ? (Number(r.salePrice) - Number(cost)).toFixed(2) : '';
  const soldId = uid();
  const inventoryId = r.inventoryId || (invRef ? invRef.id : '');
  // Check if a fulfillment record already exists for this sale
  const existingFulfil = (DB.fulfillment||[]).find(f => f.saleId === r.id);
  if (!existingFulfil) {
    // Create fulfillment record
    if (!DB.fulfillment) DB.fulfillment = [];
    DB.fulfillment.unshift({
      id: uid(), createdAt: today(),
      saleId: soldId, inventoryId,
      customerName: r.customerName||'',
      businessName: r.businessName||'',
      customerEmail: r.customerEmail||'',

      machineName: r.machineName||'',
      serialNumber: r.serialNumber||'',
      invNumber: r.invNumber||'',
      method: 'shipping',
      status: 'pending',
      carrier: r.shippingCompany||'',
      trackingNumber: r.trackingNumber||'',
      trackingLink: r.trackingLink||'',
      scheduledDate: '',
      notes: r.notes||'',
    });
  } else {
    // Update existing fulfillment with ALL current sale data
    const fidx = DB.fulfillment.findIndex(f => f.id === existingFulfil.id);
    if (fidx !== -1) DB.fulfillment[fidx] = {...existingFulfil,
      saleId: soldId, inventoryId,
      customerName: r.customerName||existingFulfil.customerName||'',
      businessName: r.businessName||existingFulfil.businessName||'',
      customerEmail: r.customerEmail||existingFulfil.customerEmail||'',
      customerPhone: r.customerPhone||existingFulfil.customerPhone||'',
      customerAddress: r.customerAddress||existingFulfil.customerAddress||'',
      customerCity: r.customerCity||existingFulfil.customerCity||'',
      customerState: r.customerState||existingFulfil.customerState||'',
      customerZip: r.customerZip||existingFulfil.customerZip||'',
      customerType: r.customerType||existingFulfil.customerType||'',
      liftgate: r.liftgate||existingFulfil.liftgate||'',
      machineName: r.machineName||existingFulfil.machineName||'',
      serialNumber: r.serialNumber||existingFulfil.serialNumber||'',
      invNumber: r.invNumber||existingFulfil.invNumber||'',
      carrier: r.shippingCompany||existingFulfil.carrier||'',
      trackingNumber: r.trackingNumber||existingFulfil.trackingNumber||'',
      trackingLink: r.trackingLink||existingFulfil.trackingLink||'',
      notes: r.notes||existingFulfil.notes||'',
    };
  }
  if (!DB.sold) DB.sold = [];
  DB.sold.unshift({id: soldId, createdAt: today(), inventoryId,
    machineName: r.machineName||'', serialNumber: r.serialNumber||'',
    customerName: r.customerName||'', businessName: r.businessName||'',
    customerEmail: r.customerEmail||'', customerPhone: r.customerPhone||'',
    customerAddress: r.customerAddress||'', customerCity: r.customerCity||'', customerState: r.customerState||'',
    customerZip: r.customerZip||'', customerType: r.customerType||'', liftgate: r.liftgate||'',
    salePrice: r.salePrice||'', dateSold: r.saleDate||today(),
    invNumber: r.invNumber||'', paymentStatus: r.paymentStatus||'PIF',
    shippingCompany: r.shippingCompany||'', trackingNumber: r.trackingNumber||'',
    condition: 'New', cost: cost||'', margin, notes: r.notes||'',
  });
  // Remove from sales table
  DB.sales = (DB.sales||[]).filter(s => s.id !== r.id);
  // Mark inventory item as sold
  const invToMark = r.inventoryId
    ? (DB.inventory||[]).find(i => i.id === r.inventoryId)
    : (invRef || findInventoryMatch(r.machineName, r.serialNumber, 'reserved') || findInventoryMatch(r.machineName, r.serialNumber, 'in_stock'));
  if (invToMark) {
    const idx2 = DB.inventory.findIndex(i => i.id === invToMark.id);
    if (idx2 !== -1) DB.inventory[idx2] = {...invToMark, status: 'sold', dateSold: r.saleDate||today()};
  }
  saveDB();
  salesView = 'sold';
  goto('sales');
}

function salePartSearch(input) {
  const q = input.value.toLowerCase().trim();

  if (!q || q.length < 2) { dropdown.style.display = 'none'; return; }
  const matches = (DB.parts||[]).filter(p => (p.itemName||'').toLowerCase().includes(q)).slice(0, 12);
  if (!matches.length) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = matches.map(p => {
    const oh = Number(p.onHand||0);
    const ohColor = oh > 0 ? 'var(--green)' : oh < 0 ? 'var(--red)' : 'var(--muted)';
    return `<div onclick="selectSalePart(this,'${p.id}')" data-part-id="${p.id}" data-name="${(p.itemName||'').replace(/"/g,'&quot;')}" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px" onmouseover="this.style.background='var(--panel2)'" onmouseout="this.style.background=''">

}

function applyPartsDeduction(partsLines, saleId, invNumber) {
  if (!partsLines || !partsLines.length) return;
  partsLines.forEach(line => {
    if (!line.itemName) return;
    // Find matching part — by partId first, then by name
    let partIdx = -1;
    if (line.partId) partIdx = (DB.parts||[]).findIndex(p => p.id === line.partId);
    if (partIdx === -1) partIdx = (DB.parts||[]).findIndex(p => (p.itemName||'').toLowerCase() === line.itemName.toLowerCase());
    if (partIdx !== -1) {
      const p = DB.parts[partIdx];
      const newSold = Number(p.soldQty||0) + line.qty;
      const newOnHand = Number(p.startQty||0) + Number(p.addedQty||0) - newSold;
      const existingInvs = (p.invNumbers||'').trim();
      const newInvNumbers = invNumber ? (existingInvs ? existingInvs + ', ' + invNumber : invNumber) : existingInvs;
      DB.parts[partIdx] = {...p, soldQty: newSold, onHand: newOnHand, invNumbers: newInvNumbers, updatedAt: new Date().toISOString()};
    }
  });
}

function revertPartsDeduction(partsLines, invNumber) {
  if (!partsLines || !partsLines.length) return;
  partsLines.forEach(line => {
    if (!line.itemName) return;
    let partIdx = -1;
    if (line.partId) partIdx = (DB.parts||[]).findIndex(p => p.id === line.partId);
    if (partIdx === -1) partIdx = (DB.parts||[]).findIndex(p => (p.itemName||'').toLowerCase() === line.itemName.toLowerCase());
    if (partIdx !== -1) {
      const p = DB.parts[partIdx];
      const newSold = Math.max(0, Number(p.soldQty||0) - line.qty);
      const newOnHand = Number(p.startQty||0) + Number(p.addedQty||0) - newSold;
      DB.parts[partIdx] = {...p, soldQty: newSold, onHand: newOnHand, updatedAt: new Date().toISOString()};
    }
  });
}

function submitSale(e) {
  e.preventDefault();
  if (_submitting) return;
  _submitting = true;
  const r = Object.fromEntries(new FormData(e.target));
  r.additionalGames = collectAdditionalGames();
  r.salePartsLines = collectSalePartsLines();
  if (saleEditing) {
    // Normalize checkbox: unchecked checkboxes are absent from FormData
    if (!r.hasShipTo) { r.hasShipTo = ''; r.shipToName=''; r.shipToPhone=''; r.shipToAddress=''; r.shipToCity=''; r.shipToState=''; r.shipToZip=''; }
    // Guard: sale may have been deleted while the edit form was open
    const stillExists = (DB.sales||[]).some(s => s.id === saleEditing.id);
    if (!stillExists) {
      showToast('⚠️ This sale no longer exists — it may have been deleted.', 'error');
      saleEditing = null; _submitting = false; render(); return;
    }
    // Batch: update fulfillment + sale in one save/render cycle
    // Inventory status management: un-reserve old, re-reserve new if machine changed
    // Revert previous parts deduction then re-apply with new lines
    revertPartsDeduction(saleEditing.salePartsLines || [], saleEditing.invNumber || '');
    applyPartsDeduction(r.salePartsLines, saleEditing.id, r.invNumber || '');
    const oldInvId = saleEditing.inventoryId || '';
    const newInvId = r.inventoryId || '';
    if (oldInvId !== newInvId) {
      if (oldInvId) {
        const oldInv = (DB.inventory||[]).find(i => i.id === oldInvId);
        if (oldInv && oldInv.status === 'reserved') {
          const oidx = DB.inventory.findIndex(i => i.id === oldInvId);
          if (oidx !== -1) DB.inventory[oidx] = {...oldInv, status: 'in_stock'};
        }
      }
      if (newInvId) {
        const newInv = (DB.inventory||[]).find(i => i.id === newInvId);
        if (newInv && newInv.status === 'in_stock') {
          const nidx = DB.inventory.findIndex(i => i.id === newInvId);
          if (nidx !== -1) DB.inventory[nidx] = {...newInv, status: 'reserved'};
        }
      }
    }
    if (!DB.fulfillment) DB.fulfillment = [];
    const linked = DB.fulfillment.find(f => f.saleId === saleEditing.id);
    const fulfillUpdate = {
      customerName:    r.customerName,
      businessName:    r.businessName,
      customerEmail:   r.customerEmail,
      customerPhone:   r.customerPhone,
      customerAddress: r.customerAddress,
      customerCity:    r.customerCity,
      customerState:   r.customerState,
      customerZip:     r.customerZip,
      customerType:    r.customerType,
      liftgate:        r.liftgate,
      machineName:     r.machineName,
      serialNumber:    r.serialNumber,
      invNumber:       r.invNumber,
      carrier:         r.shippingCompany,
      trackingNumber:  r.trackingNumber,
      trackingLink:    r.trackingLink,
      status:          r.shippingStatus,
      notes:           r.notes,
      hasShipTo:       r.hasShipTo || '',
      shipToName:      r.shipToName || '',
      shipToPhone:     r.shipToPhone || '',
      shipToAddress:   r.shipToAddress || '',
      shipToCity:      r.shipToCity || '',
      shipToState:     r.shipToState || '',
      shipToZip:       r.shipToZip || '',
    };
    if (linked) {
      // Update existing fulfillment — always overwrite with sale values (no || fallback so fields can be cleared)
      const fidx = DB.fulfillment.findIndex(f => f.id === linked.id);
      if (fidx !== -1) DB.fulfillment[fidx] = {...linked, ...fulfillUpdate};
    } else {
      // No fulfillment yet (legacy sale) — create one now
      DB.fulfillment.unshift({
        id: uid(), createdAt: today(),
        saleId: saleEditing.id,
        inventoryId: saleEditing.inventoryId || r.inventoryId || '',
        method: 'shipping', status: 'pending',
        scheduledDate: '', notes: r.notes || '',
        ...fulfillUpdate,
      });
    }
    DB.sales = DB.sales.map(x => x.id === saleEditing.id ? {...x, ...r} : x);
    saleEditing = null;
    upsertCustomer(r);
    _submitting = false; saveDB(); render();
  } else {
    const newId = uid();
    // TBD serial means intentionally unassigned — don't link or search inventory
    const isTBD = (r.serialNumber||'') === 'TBD';
    if (isTBD) { r.serialNumber = ''; r.inventoryId = ''; }
    // Find and mark inventory item
    let invItem = null;
    let inventoryId = r.inventoryId || '';
    if (!isTBD) {
      if (inventoryId) invItem = (DB.inventory||[]).find(i => i.id === inventoryId);
      if (!invItem) { invItem = findInventoryMatch(r.machineName, r.serialNumber); inventoryId = invItem ? invItem.id : ''; }
    }
    // Guard: warn if matched inventory name doesn't match typed name
    if (invItem && r.machineName) {
      const invName = (invItem.machineName||'').toLowerCase().trim();
      const saleName = (r.machineName||'').toLowerCase().trim();
      if (invName !== saleName) {
        const choice = confirm(
          `⚠️ Inventory mismatch!\n\n` +
          `You typed: "${r.machineName}"\n` +
          `Linked inventory item: "${invItem.machineName}"\n\n` +
          `OK = Create a new inventory item for "${r.machineName}" (recommended)\n` +
          `Cancel = Use the linked item anyway`
        );
        if (choice) {
          const newInvId = uid();
          DB.inventory.unshift({
            id: newInvId, createdAt: today(), updatedAt: new Date().toISOString(),
            machineName: r.machineName, serialNumber: r.serialNumber || '',
            status: 'reserved', cost: r.cost || '', condition: r.condition || 'New',
            section: 'NEW SHOWROOM', location: '', dateReceived: today(), dateSold: '', notes: '',
          });
          invItem = DB.inventory[0];
          inventoryId = newInvId;
          r.inventoryId = newInvId;
        } else {
          // Use linked item — proceed as normal
        }
      }
    }
    // Guard: warn if matched inventory is already sold or reserved
    if (invItem && invItem.status === 'sold') {
      if (!confirm(`⚠️ "${invItem.machineName}" is already marked SOLD in inventory.\n\nCreate this sale anyway? (inventory status will NOT be changed)`)) { _submitting = false; return; }
      invItem = null; // Don't overwrite inventory status for sold items
      inventoryId = ''; // Don't link this sale to an already-sold inventory record
    } else if (invItem && invItem.status === 'reserved') {
      if (!confirm(`⚠️ "${invItem.machineName}" is already RESERVED for another sale.\n\nContinue? (will re-reserve for this sale)`)) { _submitting = false; return; }
    }
    if (invItem) { const idx = DB.inventory.findIndex(i => i.id === invItem.id); if (idx !== -1) DB.inventory[idx] = {...invItem, status: 'reserved'}; }
    r.inventoryId = inventoryId;
    if (!DB.sales) DB.sales = [];
    DB.sales.unshift({id: newId, createdAt: today(), inventoryId, ...r});
    // Auto-create fulfillment record
    if (!DB.fulfillment) DB.fulfillment = [];
    DB.fulfillment.unshift({
      id: uid(),
      createdAt: today(),
      saleId: newId,
      inventoryId,
      customerName: r.customerName || '',
      businessName: r.businessName || '',
      customerEmail: r.customerEmail || '',
      customerPhone: r.customerPhone || '',
      customerAddress: r.customerAddress || '',
      customerCity: r.customerCity || '',
      customerState: r.customerState || '',
      customerZip: r.customerZip || '',
      customerType: r.customerType || '',
      liftgate: r.liftgate || '',
      machineName: r.machineName || '',
      serialNumber: r.serialNumber || '',
      invNumber: r.invNumber || '',
      method: 'shipping',
      status: r.shippingStatus || 'pending',
      carrier: r.shippingCompany || '',
      trackingNumber: r.trackingNumber || '',
      trackingLink: r.trackingLink || '',
      scheduledDate: '',
      notes: r.notes || '',
      hasShipTo: r.hasShipTo || '',
      shipToName: r.shipToName || '',
      shipToPhone: r.shipToPhone || '',
      shipToAddress: r.shipToAddress || '',
      shipToCity: r.shipToCity || '',
      shipToState: r.shipToState || '',
      shipToZip: r.shipToZip || '',
    });
    applyPartsDeduction(r.salePartsLines, newId, r.invNumber || '');
    upsertCustomer(r);
    _submitting = false; saveDB();
    render();
  }
}

// ── DELETE SOLD ───────────────────────────────────────────────
function deleteSold(id) {
  const sale = (DB.sold||[]).find(s=>s.id===id);
  if (!sale) return;
  if (!confirm(`Delete sold record for "${sale.machineName||'this item'}"?\n\nCustomer info will be moved back into Active Sales.`)) return;

  const ts = new Date().toISOString();

  // Always restore customer info to active sales with full details
  if (!DB.sales) DB.sales = [];
  DB.sales.unshift({
    id: uid(), createdAt: sale.createdAt || today(), updatedAt: ts,
    machineName: sale.machineName || '',
    serialNumber: sale.serialNumber || '',
    customerName: sale.customerName || '',
    businessName: sale.businessName || '',
    customerEmail: sale.customerEmail || '',
    customerPhone: sale.customerPhone || '',
    customerAddress: sale.customerAddress || '',
    customerCity: sale.customerCity || '',
    customerState: sale.customerState || '',
    customerZip: sale.customerZip || '',
    customerType: sale.customerType || '',
    liftgate: sale.liftgate || '',
    salePrice: sale.salePrice || '',
    dateSold: sale.dateSold || '',
    invNumber: sale.invNumber || '',
    paymentStatus: sale.paymentStatus || '',
    shippingCompany: sale.shippingCompany || '',
    trackingNumber: sale.trackingNumber || '',
    condition: sale.condition || '',
    cost: sale.cost || '',
    margin: sale.margin || '',
    notes: sale.notes || '',
    inventoryId: sale.inventoryId || '',
  });

  // Restore inventory item to in_stock
  const invItem = sale.inventoryId
    ? (DB.inventory||[]).find(i => i.id === sale.inventoryId)
    : (DB.inventory||[]).find(i =>
        (sale.serialNumber && i.serialNumber === sale.serialNumber) ||
        (i.machineName && sale.machineName && i.machineName.toLowerCase().trim() === sale.machineName.toLowerCase().trim())
      );
  if (invItem) {
    const idx = DB.inventory.findIndex(i => i.id === invItem.id);
    if (idx !== -1) {
      const newStatus = invItem.status === 'sold' ? 'in_stock' : invItem.status;
      DB.inventory[idx] = {...invItem, status: newStatus, dateSold: '', updatedAt: ts};
    }
  }
  // Remove linked fulfillment record
  DB.fulfillment = (DB.fulfillment||[]).filter(f => f.saleId !== id);
  DB.sold = DB.sold.filter(s => s.id !== id);
  saveDB(); render();
  showToast('Sale deleted — customer info moved to Active Sales');
}

// ── REVERT SALE TO INVENTORY ───────────────────────────────────
function revertSaleToInventory(id) {
  const sale = (DB.sold||[]).find(s => s.id === id);
  if (!sale) return;
  if (!confirm(`Revert "${sale.machineName || 'this sale'}" back to inventory as In Stock?\n\nThis will:\n• Remove the sold record\n• Set inventory status back to In Stock\n• Remove the linked fulfillment record`)) return;

  const ts = new Date().toISOString();

  // Restore inventory item to in_stock
  const invItem = sale.inventoryId
    ? (DB.inventory||[]).find(i => i.id === sale.inventoryId)
    : (DB.inventory||[]).find(i =>
        (sale.serialNumber && i.serialNumber === sale.serialNumber) ||
        (i.machineName && sale.machineName && i.machineName.toLowerCase().trim() === sale.machineName.toLowerCase().trim())
      );
  if (invItem) {
    const idx = DB.inventory.findIndex(i => i.id === invItem.id);
    if (idx !== -1) {
      DB.inventory[idx] = {...invItem, status: 'in_stock', dateSold: '', updatedAt: ts};
    }
  } else {
    // No linked inventory found — offer to create one
    if (confirm('No linked inventory item found. Add it back to inventory as a new In Stock item?')) {
      DB.inventory.unshift({
        id: uid(), createdAt: today(), updatedAt: ts,
        machineName: sale.machineName || '',
        serialNumber: sale.serialNumber || '',
        status: 'in_stock',
        cost: sale.cost || '',
        condition: sale.condition || 'Used',
        section: 'NEW SHOWROOM', location: '', notes: '',
        dateReceived: today(), dateSold: '',
      });
    }
  }
  // Remove linked fulfillment
  DB.fulfillment = (DB.fulfillment||[]).filter(f => f.saleId !== id);
  // Remove the sold record
  DB.sold = DB.sold.filter(s => s.id !== id);
  saveDB(); render();
  showToast('↩ Sale reverted — item back in inventory');
}

function submitSimple(e,t){
  e.preventDefault();
  const r=Object.fromEntries(new FormData(e.target));
  if(editSt[t]){
    const editingId = editSt[t].id;
    const editingRec = editSt[t];

    // ── FULFILLMENT → SALE + SOLD sync ──
    if(t==='fulfillment' && editingRec.saleId) {
      const syncFields = {
        customerName:r.customerName, businessName:r.businessName,
        customerEmail:r.customerEmail, customerPhone:r.customerPhone,
        customerAddress:r.customerAddress, customerCity:r.customerCity, customerState:r.customerState,
        customerZip:r.customerZip, customerType:r.customerType, liftgate:r.liftgate,
        shippingCompany:r.carrier, trackingNumber:r.trackingNumber, trackingLink:r.trackingLink,
        shippingStatus:r.status,
        machineName:r.machineName, serialNumber:r.serialNumber,
      };
      const saleIdx = (DB.sales||[]).findIndex(s=>s.id===editingRec.saleId);
      if(saleIdx !== -1) DB.sales[saleIdx] = {...DB.sales[saleIdx], ...syncFields};
      const soldIdx = (DB.sold||[]).findIndex(s=>s.id===editingRec.saleId);
      if(soldIdx !== -1) DB.sold[soldIdx] = {...DB.sold[soldIdx], ...syncFields};
    }

    // ── SOLD → FULFILLMENT sync ──
    if(t==='sold') {
      const linkedFulfil = (DB.fulfillment||[]).filter(f => f.saleId === editingId);
      linkedFulfil.forEach(f => {
        const fidx = DB.fulfillment.findIndex(ff => ff.id === f.id);
        if (fidx !== -1) DB.fulfillment[fidx] = {...f,
          customerName:r.customerName, businessName:r.businessName,
          customerEmail:r.customerEmail, customerPhone:r.customerPhone,
          customerAddress:r.customerAddress, customerCity:r.customerCity, customerState:r.customerState,
          customerZip:r.customerZip, customerType:r.customerType, liftgate:r.liftgate,
          machineName:r.machineName, serialNumber:r.serialNumber, invNumber:r.invNumber,
          carrier:r.shippingCompany, trackingNumber:r.trackingNumber,
        };
      });
    }

    delete editSt[t];
    if (['sales','sold','pendingSales'].includes(t)) upsertCustomer(r);
    updateRow(t,editingId,r);
  } else {
    if (['sales','sold','pendingSales'].includes(t)) upsertCustomer(r);
    addRow(t,r);
  }
}

function moveOrderInGame(orderId, direction) {
  const game = ((DB.pendingSales||[]).find(r => r.id === orderId)?.gameName||'').toUpperCase().trim();
  const indices = (DB.pendingSales||[]).reduce((acc, r, i) => {
    if ((r.gameName||'').toUpperCase().trim() === game) acc.push(i);
    return acc;
  }, []);
  const posInGroup = indices.findIndex(i => DB.pendingSales[i].id === orderId);
  const swapPos = posInGroup + direction;
  if (swapPos < 0 || swapPos >= indices.length) return;
  const idxA = indices[posInGroup];
  const idxB = indices[swapPos];
  [DB.pendingSales[idxA], DB.pendingSales[idxB]] = [DB.pendingSales[idxB], DB.pendingSales[idxA]];
  saveDB();
  render();
}
function promptMoveCustomer(orderId, customerName, currentGame) {
  const games = [...new Set((DB.pendingSales||[]).map(r => (r.gameName||'').toUpperCase().trim()))].filter(g => g && g !== currentGame.toUpperCase().trim()).sort();
  if (!games.length) { showToast('No other game categories to move to.'); return; }
  const choice = prompt(`Move "${customerName}" to which game?\n\nCurrent: ${currentGame}\n\nAvailable:\n${games.map((g,i)=>`${i+1}. ${g}`).join('\n')}\n\nType the number or game name:`);
  if (!choice || !choice.trim()) return;
  const num = parseInt(choice.trim());
  const target = (!isNaN(num) && num >= 1 && num <= games.length) ? games[num-1] : games.find(g => g.toLowerCase().includes(choice.trim().toLowerCase()));
  if (!target) { showToast('Game not found. Try again.', 'error'); return; }
  moveCustomerToGame(orderId, target);
}

// ── Pre-Order Game Category Management ─────────────────────────
function renameGame(oldName) {
  const newName = prompt(`Rename game category:\n"${oldName}"\n\nNew name:`, oldName);
  if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
  const trimmed = newName.trim().toUpperCase();
  // Check for conflicts
  const existingNames = [...new Set((DB.pendingSales||[]).map(r => (r.gameName||'').toUpperCase().trim()))];
  if (existingNames.includes(trimmed) && trimmed !== oldName.toUpperCase()) {
    if (!confirm(`"${trimmed}" already exists as a category. Orders will be merged with it. Continue?`)) return;
  }
  // Update all orders with this gameName
  let count = 0;
  DB.pendingSales = (DB.pendingSales||[]).map(r => {
    if ((r.gameName||'').toUpperCase().trim() === oldName.toUpperCase().trim()) {
      count++;
      return {...r, gameName: trimmed, updatedAt: new Date().toISOString()};
    }
    return r;
  });
  saveDB();
  showToast(`✅ Renamed "${oldName}" → "${trimmed}" (${count} orders updated)`);
  render();
}

function moveCustomerToGame(orderId, newGameName) {
  if (!newGameName) return;
  const order = (DB.pendingSales||[]).find(r => r.id === orderId);
  if (!order) return;
  const oldGame = order.gameName || '—';
  DB.pendingSales = (DB.pendingSales||[]).map(r =>
    r.id === orderId ? {...r, gameName: newGameName, updatedAt: new Date().toISOString()} : r
  );
  saveDB();
  showToast(`✅ Moved "${order.customerName||'order'}" from "${oldGame}" → "${newGameName}"`);
  render();
}

function addNewGameCategory() {
  const name = prompt('New game category name (will appear as a group on Pre-Orders):');
  if (!name || !name.trim()) return;
  const trimmed = name.trim().toUpperCase();
  // Check if it already exists
  const existingNames = [...new Set((DB.pendingSales||[]).map(r => (r.gameName||'').toUpperCase().trim()))];
  if (existingNames.includes(trimmed)) {
    showToast(`"${trimmed}" already exists — scrolling to it`);
    render();
    return;
  }
  // Pre-fill add form with this game name
  psEditing = {gameName: trimmed, forceGame: true};
  render();
  window.scrollTo(0, 0);
  setTimeout(() => {
    const inp = document.querySelector('input[name="gameName"]');
    if (inp) inp.value = trimmed;
  }, 50);
}

function submitPS(e) {
  e.preventDefault();
  const r = Object.fromEntries(new FormData(e.target));
  if (!r.customerName?.trim() && !r.businessName?.trim()) {
    showToast('Please enter a customer name or business name.', 'error');
    return;
  }
  // Keep legacy `state` field in sync with customerState for backward compat
  r.state = r.customerState || r.state || '';
  if(psEditing && psEditing.id){const psId=psEditing.id;psEditing=null;upsertCustomer(r);updateRow('pendingSales',psId,r);}
  else { psEditing=null; upsertCustomer(r); addRow('pendingSales',r); }
}

// Save the current form data then immediately move to Sold
function submitAndSoldPS(event) {
  const form = event.target.closest('form') || document.querySelector('#mc form');
  if (!form) return;
  const r = Object.fromEntries(new FormData(form));
  r.state = r.customerState || r.state || '';
  const rec = {...psEditing, ...r};
  psToSold(rec);
}

function psToSold(r) {
  if(!confirm('Mark as Sold and remove from Pre-Orders?')) return;
  const soldId = uid();
  const soldDate = today();
  // Look up cost from inventory using smart matching
  const invRef = findInventoryMatch(r.gameName, null, 'in_stock');
  const cost = invRef ? invRef.cost || '' : '';
  const margin = (r.price && cost) ? (Number(r.price) - Number(cost)).toFixed(2) : '';
  const inventoryId = invRef ? invRef.id : '';
  // Add sold record
  if (!DB.sold) DB.sold = [];
  DB.sold.unshift({
    id: soldId, createdAt: soldDate, inventoryId,
    machineName: r.gameName||'', serialNumber: invRef ? invRef.serialNumber||'' : '',
    customerName: r.customerName||'', businessName: r.businessName||'',
    customerEmail: r.customerEmail||'', customerPhone: r.customerPhone||'',
    customerAddress: r.customerAddress||'', customerCity: r.customerCity||'', customerState: r.customerState||r.state||'',
    customerZip: r.customerZip||'', customerType: r.customerType||'', liftgate: r.liftgate||'',
    salePrice: r.price||'', dateSold: soldDate,
    invNumber: r.invNumber||'', paymentStatus: r.paymentStatus||'PIF',
    shippingCompany:'', trackingNumber:'',
    condition:'New', cost, margin, notes: r.notes||'',
  });
  // Auto-create fulfillment record
  if (!DB.fulfillment) DB.fulfillment = [];
  DB.fulfillment.unshift({
    id: uid(), createdAt: soldDate, saleId: soldId, inventoryId,
    customerName: r.customerName||'', businessName: r.businessName||'',
    customerEmail: r.customerEmail||'', customerPhone: r.customerPhone||'',
    customerAddress: r.customerAddress||'', customerCity: r.customerCity||'', customerState: r.customerState||r.state||'',
    customerZip: r.customerZip||'', customerType: r.customerType||'', liftgate: r.liftgate||'',
    machineName: r.gameName||'', serialNumber: invRef ? invRef.serialNumber||'' : '',
    invNumber: r.invNumber||'', method: 'shipping', status: 'pending',
    carrier: '', trackingNumber: '', trackingLink: '', scheduledDate: '', notes: r.notes||'',
  });
  // Update inventory status to sold
  if (invRef) {
    const idx = DB.inventory.findIndex(i => i.id === invRef.id);
    if (idx !== -1) DB.inventory[idx] = {...invRef, status: 'sold', dateSold: soldDate};
  }
  // Remove from pre-orders
  DB.pendingSales = DB.pendingSales.filter(x => x.id !== r.id);
  upsertCustomer(r);
  salesView = 'sold';
  saveDB(); goto('sales');
}

          <button class="btn ghost" style="font-size:12px" onclick="document.getElementById('shopify-cat-wrap-${oi}').style.display='none'">✕</button>
        </div>
        <button class="btn ghost" onclick="shopifyOrders[${oi}]._status='skipped';render()" style="font-size:12px">Skip</button>

      <div><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase">Email</div><div style="font-size:13px">${order.customerEmail||'—'}</div></div>
      <div><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase">Phone</div><div style="font-size:13px">${order.customerPhone||'—'}</div></div>
      <div><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase">Shopify Order #</div><div style="font-size:13px;font-weight:700;color:var(--accent)">${order.shopifyOrderNum||'—'}</div></div>
      <div><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase">Order Date</div><div style="font-size:13px">${order.orderDate||'—'}</div></div>
      <div><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase">Total</div><div style="font-size:13px;font-weight:700;color:var(--green)">${order.total||'—'}</div></div>
      <div><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase">Shipping</div><div style="font-size:13px">${order.shippingMethod||'—'}</div></div>

function renderShopifyGameMatch(item, oi, li) {
  const q = item.rawName.toLowerCase();
  const matches = (DB.inventory||[])
    .filter(inv => inv.status !== 'sold')
    .map(inv => ({inv, score: fuzzyScore(q, (inv.machineName||'').toLowerCase())}))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);
  const matched = item._matchId ? (DB.inventory||[]).find(i => i.id === item._matchId) : null;
  return `<select onchange="shopifyOrders[${oi}].lineItems[${li}]._matchId=this.value" style="padding:5px 8px;border-radius:6px;border:1px solid ${matched?'var(--green)':'var(--yellow)'};background:var(--bg);color:var(--text);font-size:12px;max-width:220px">
    <option value="">— Pick inventory match —</option>
    ${matches.map(({inv}) => `<option value="${inv.id}" ${item._matchId===inv.id?'selected':''}>${inv.machineName}${inv.serialNumber?' #'+inv.serialNumber:''}</option>`).join('')}
    <option value="__new__" ${item._matchId==='__new__'?'selected':''}>+ Not in inventory yet</option>
  </select>`;
}

function renderShopifyPartMatch(item, oi, li) {
  const q = item.rawName.toLowerCase();
  const matches = (DB.parts||[])
    .map(p => ({p, score: fuzzyScore(q, (p.itemName||'').toLowerCase())}))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);
  const matched = item._matchId ? (DB.parts||[]).find(p => p.id === item._matchId) : null;
  return `<select onchange="shopifyOrders[${oi}].lineItems[${li}]._matchId=this.value" style="padding:5px 8px;border-radius:6px;border:1px solid ${matched?'var(--green)':'var(--yellow)'};background:var(--bg);color:var(--text);font-size:12px;max-width:220px">
    <option value="">— Pick part match —</option>
    ${matches.map(({p}) => `<option value="${p.id}" ${item._matchId===p.id?'selected':''}>${p.itemName} (${Number(p.onHand||0)} on hand)</option>`).join('')}
    <option value="__new__" ${item._matchId==='__new__'?'selected':''}>+ Not in parts list</option>
  </select>`;
}

function fuzzyScore(query, target) {
  if (!query || !target) return 0;
  if (target.includes(query)) return 100;
  const qWords = query.split(/\s+/).filter(w => w.length > 2);
  let score = 0;
  qWords.forEach(w => { if (target.includes(w)) score += 10; });
  return score;
}

function convertShopifyOrder(oi) {
  const order = shopifyOrders[oi];
  if (!order) return;
  const gameItems = (order.lineItems||[]).filter(i => i._type === 'game');
  const partItems = (order.lineItems||[]).filter(i => i._type === 'part');
  // Build sale record
  const liftgate = (order.shippingMethod||'').toLowerCase().includes('liftgate') 
    ? ((order.shippingMethod||'').toLowerCase().includes('residential') ? 'Yes - Residential' : 'Yes') 
    : 'No';
  const primaryGame = gameItems[0];
  const invItem = primaryGame?._matchId && primaryGame._matchId !== '__new__'
    ? (DB.inventory||[]).find(i => i.id === primaryGame._matchId) : null;
  const newSaleId = uid();
  const saleRecord = {
    id: newSaleId,
    createdAt: today(),
    machineName: invItem?.machineName || primaryGame?.rawName || '',
    serialNumber: invItem?.serialNumber || '',
    inventoryId: invItem?.id || '',
    shopifyOrderNum: order.shopifyOrderNum || '',
    invNumber: '',
    salePrice: order.subtotal || '',
    saleDate: order.orderDate || today(),
    status: 'open',
    paymentStatus: 'Shopify',
    customerName: order.customerName || '',
    customerEmail: order.customerEmail || '',
    customerPhone: order.customerPhone || '',
    customerAddress: order.customerAddress || '',
    customerCity: order.customerCity || '',
    customerState: order.customerState || '',
    customerZip: order.customerZip || '',
    customerType: liftgate.includes('Residential') ? 'Residential' : '',
    liftgate,
    shippingCompany: '',
    trackingNumber: '',
    trackingLink: '',
    shippingStatus: 'pending',
    notes: `Shopify order ${order.shopifyOrderNum||''}. Shipping: $${order.shippingCost||0}. Total: ${order.total||''}`,
    additionalGames: gameItems.slice(1).map(g => {
      const inv2 = g._matchId && g._matchId !== '__new__' ? (DB.inventory||[]).find(i => i.id === g._matchId) : null;
      return { machineName: inv2?.machineName || g.rawName, serialNumber: inv2?.serialNumber || '' };
    }),
    salePartsLines: partItems.filter(p => p._matchId && p._matchId !== '__new__').map(p => {
      const part = (DB.parts||[]).find(pt => pt.id === p._matchId);
      return { itemName: part?.itemName || p.rawName, partId: p._matchId, qty: p.qty || 1, price: p.price || 0, includeInFulfillment: false };
    }),
    hasShipTo: '', shipToName: '', shipToPhone: '', shipToAddress: '', shipToCity: '', shipToState: '', shipToZip: '',
  };
  // Mark inventory reserved
  if (invItem) {
    const idx = DB.inventory.findIndex(i => i.id === invItem.id);
    if (idx !== -1 && DB.inventory[idx].status !== 'sold') DB.inventory[idx] = {...DB.inventory[idx], status: 'reserved'};
  }
  // Deduct parts
  applyPartsDeduction(saleRecord.salePartsLines, newSaleId, '');
  // Create sale
  if (!DB.sales) DB.sales = [];
  DB.sales.unshift(saleRecord);
  // Create fulfillment
  if (!DB.fulfillment) DB.fulfillment = [];
  DB.fulfillment.unshift({
    id: uid(), createdAt: today(), saleId: newSaleId,
    inventoryId: saleRecord.inventoryId,
    customerName: saleRecord.customerName, businessName: '',
    customerEmail: saleRecord.customerEmail, customerPhone: saleRecord.customerPhone,
    customerAddress: saleRecord.customerAddress, customerCity: saleRecord.customerCity,
    customerState: saleRecord.customerState, customerZip: saleRecord.customerZip,
    customerType: saleRecord.customerType, liftgate: saleRecord.liftgate,
    machineName: saleRecord.machineName, serialNumber: saleRecord.serialNumber,
    invNumber: '', method: 'shipping', status: 'pending',
    carrier: '', trackingNumber: '', trackingLink: '', scheduledDate: '', notes: saleRecord.notes,
    hasShipTo: '', shipToName: '', shipToPhone: '', shipToAddress: '', shipToCity: '', shipToState: '', shipToZip: '',
  });
  upsertCustomer(saleRecord);
  shopifyOrders[oi]._status = 'converted';
  saveDB();
  showToast(`✅ Order ${order.shopifyOrderNum||''} converted to sale!`);
  render();
}

function showShopifyCatPicker(oi) {
  const wrap = document.getElementById(`shopify-cat-wrap-${oi}`);
  if (wrap) wrap.style.display = 'flex';
}

function dismissShopifyOrder(oi) {
  const order = shopifyOrders[oi];
  if (!order) return;
  // Persist as an object with .id so Firestore can save it (plain strings have no .id and silently fail)
  if (order.shopifyOrderNum) {
    const orderNum = order.shopifyOrderNum;
    shopifyDismissed.add(orderNum);
    if (!DB.shopifyDismissed) DB.shopifyDismissed = [];
    const alreadyIn = DB.shopifyDismissed.some(r => (r.id || r) === orderNum);
    if (!alreadyIn) {
      const rec = {id: orderNum, orderNum, dismissedAt: new Date().toISOString()};
      DB.shopifyDismissed.push(rec);
      saveDB('shopifyDismissed', orderNum); // targeted save — guaranteed to reach Firestore
    }
  }
  shopifyOrders.splice(oi, 1);
  render();
}

function convertShopifyToPreOrder(oi) {
  const order = shopifyOrders[oi];
  if (!order) return;

  // Get or prompt for category
  const catSel = document.getElementById(`shopify-cat-${oi}`);
  let category = catSel ? catSel.value : '';
  if (category === '__new__') {
    category = prompt('Enter a category name for this pre-order:') || '';
    if (!category.trim()) { showToast('Category required for pre-order.', 'error'); return; }
    category = category.trim();
  }
  if (!category) {
    showToast('Please select or enter a category first.', 'error');
    return;
  }

  const liftgate = (order.shippingMethod||'').toLowerCase().includes('liftgate')
    ? ((order.shippingMethod||'').toLowerCase().includes('residential') ? 'Yes - Residential' : 'Yes')
    : 'No';

  // Create a pre-order entry per game line item (or one generic if no games)
  const gameItems = (order.lineItems||[]).filter(i => i._type === 'game');
  const itemsToCreate = gameItems.length ? gameItems : [{rawName: '', qty: 1, price: order.subtotal || 0}];

  if (!DB.pendingSales) DB.pendingSales = [];
  itemsToCreate.forEach(item => {
    DB.pendingSales.unshift({
      id: uid(), createdAt: today(),
      category,
      gameName: category,
      customerName: order.customerName || '',
      customerEmail: order.customerEmail || '',
      customerPhone: order.customerPhone || '',
      customerAddress: order.customerAddress || '',
      customerCity: order.customerCity || '',
      customerState: order.customerState || '',
      customerZip: order.customerZip || '',
      liftgate,
      state: order.customerState || '',
      model: '', price: order.subtotal || item.price || '',
      paymentStatus: 'Shopify',
      paymentNotes: '', depositAmount: '',
      shopifyOrderNum: order.shopifyOrderNum || '',
      notes: `Shopify order ${order.shopifyOrderNum||''}. Total: ${order.total||''}`,
      invNumber: '',
    });
  });

  upsertCustomer({
    customerName: order.customerName, customerEmail: order.customerEmail,
    customerPhone: order.customerPhone, customerAddress: order.customerAddress,
    customerCity: order.customerCity, customerState: order.customerState,
    customerZip: order.customerZip,
  });

  // Remove from the visible list immediately
  shopifyOrders.splice(oi, 1);

  // Permanently dismiss so it never re-appears after a Gmail re-fetch
  if (order.shopifyOrderNum) {
    const orderNum = order.shopifyOrderNum;
    shopifyDismissed.add(orderNum);
    if (!DB.shopifyDismissed) DB.shopifyDismissed = [];
    const alreadyIn = DB.shopifyDismissed.some(r => (r.id || r) === orderNum);
    if (!alreadyIn) {
      DB.shopifyDismissed.push({id: orderNum, orderNum, dismissedAt: new Date().toISOString()});
    }
  }

  saveDB();
  showToast(`✅ Order ${order.shopifyOrderNum||''} added to Pre-Orders → ${category}!`);
  render();
}

async function fetchShopifyFromGmail() {
  const btn = document.getElementById('shopify-fetch-btn');
  if (!SYNC_URL) {
    showToast('⚠️ Apps Script URL not configured. Set SYNC_URL at the top of index.html.', 'error');
    return;
  }
  if (btn) { btn.textContent = '⏳ Checking Gmail…'; btn.disabled = true; }
  try {
    // Call Google Apps Script which has Gmail access server-side
    const response = await fetch(`${SYNC_URL}?key=${encodeURIComponent(SYNC_KEY)}&action=getOrders`, {method:'GET'});
    if (!response.ok) { showToast('❌ Server error ' + response.status + '. Check Apps Script deployment.', 'error'); return; }
    const json = await response.json();
    // Accept both plain array (old script) and {ok:true, orders:[]} (new script)
    const rawOrders = Array.isArray(json) ? json : (json && Array.isArray(json.orders) ? json.orders : null);
    if (!rawOrders) { showToast('❌ Unexpected response from Apps Script: ' + JSON.stringify(json).slice(0,120), 'error'); return; }
    if (!rawOrders.length) { showToast('No new Shopify orders found in Gmail.', 'info'); return; }
    // Convert Apps Script format to app format
    const orders = rawOrders.map(o => ({
      shopifyOrderNum: '#' + o.orderNumber,
      customerName: o.customerName || '',
      customerEmail: o.customerEmail || '',
      customerPhone: o.customerPhone || '',
      customerAddress: o.address || '',
      customerCity: o.city || '',
      customerState: o.state || '',
      customerZip: o.zip || '',
      orderDate: (o.orderDate||'').slice(0,10),
      shippingMethod: o.shippingType || '',
      shippingCost: parseFloat(o.shippingCost||0),
      subtotal: parseFloat(o.salePrice||0),
      total: o.total ? '$'+o.total : '',
      liftgate: '',
      lineItems: [{
        rawName: o.productName || '',
        qty: parseInt(o.quantity||1),
        price: parseFloat(o.salePrice||0)
      }],
      _status: 'pending',
      _msgId: o.msgId,
      _shopifyUrl: o.shopifyUrl
    }));
    // Auto-classify and fuzzy match line items
    orders.forEach(order => {
      (order.lineItems||[]).forEach(item => {
        const name = (item.rawName||'').toLowerCase();
        const gameKeywords = ['pinball','machine','stern','jersey jack','spooky','chicago gaming'];
        const isGame = gameKeywords.some(k => name.includes(k)) || Number(item.price||0) > 500;
        item._type = isGame ? 'game' : 'part';
        if (isGame) {
          const best = (DB.inventory||[])
            .filter(inv => inv.status !== 'sold')
            .map(inv => ({inv, score: fuzzyScore(name, (inv.machineName||'').toLowerCase())}))
            .filter(x => x.score > 0)
            .sort((a,b) => b.score - a.score)[0];
          item._matchId = best ? best.inv.id : '';
        } else {
          const best = (DB.parts||[])
            .map(p => ({p, score: fuzzyScore(name, (p.itemName||'').toLowerCase())}))
            .filter(x => x.score > 0)
            .sort((a,b) => b.score - a.score)[0];
          item._matchId = best ? best.p.id : '';
        }
      });
    });
    // Merge — avoid duplicates and already-dismissed orders
    const existingNums = new Set(shopifyOrders.map(o => o.shopifyOrderNum));
    const dismissed = new Set((DB.shopifyDismissed || []).map(r => r.id || r));
    const newOrders = orders.filter(o => !existingNums.has(o.shopifyOrderNum) && !dismissed.has(o.shopifyOrderNum));
    shopifyOrders = [...newOrders, ...shopifyOrders];
    showToast(`✅ Found ${newOrders.length} new order${newOrders.length!==1?'s':''}!`);
    render();
  } catch(err) {
    showToast('❌ Gmail fetch failed. Check console.', 'error');
    console.error('Shopify Gmail error:', err);
  } finally {
    if (btn) { btn.textContent = '📬 Check Gmail for New Orders'; btn.disabled = false; }
  }
}

    const mc = document.getElementById('mc'); if (!mc) return;
    mc.innerHTML = ({

      leads: ()=>renderSimple('leads','Leads',
        [{k:'name',l:'NAME',req:1},{k:'email',l:'EMAIL'},{k:'phone',l:'PHONE'},{k:'interestedMachine',l:'INTERESTED IN'},{k:'source',l:'SOURCE'},{k:'status',l:'STATUS',type:'select',opts:['new','contacted','qualified','closed','lost'],def:'new'}],
        [{k:'name',l:'NAME'},{k:'email',l:'EMAIL',m:1},{k:'phone',l:'PHONE',m:1},{k:'interestedMachine',l:'INTERESTED IN'},{k:'source',l:'SOURCE',m:1},{k:'status',l:'STATUS',badge:{new:'bg-blue',contacted:'bg-yellow',qualified:'bg-green',lost:'bg-red'}},{k:'createdAt',l:'DATE',m:1}]),
      service: ()=>renderServiceCalls(),

// ── TOAST NOTIFICATION ───────────────────────────────────────
function showToast(msg, type='success') {
  let t = document.getElementById('sda-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'sda-toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:0 4px 24px rgba(0,0,0,0.35);transition:opacity .4s;max-width:90vw;text-align:center;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.style.background = type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : '#555';
  t.style.color = '#fff';
  t.style.opacity = '1';
  t.textContent = msg;
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 3800);
}

function submitSold(e) {
  e.preventDefault();
  if (_submitting) return;
  _submitting = true;
  const r = Object.fromEntries(new FormData(e.target));
  if (editSt['sold']) {
    const editingId = editSt['sold'].id;
    // Update sold record in DB directly (no render yet)
    DB.sold = DB.sold.map(x => x.id === editingId ? {...x, ...r} : x);
    // Sync address fields to linked fulfillment record BEFORE render
    const linkedFulfil = (DB.fulfillment||[]).filter(f => f.saleId === editingId);
    linkedFulfil.forEach(f => {
      const fidx = DB.fulfillment.findIndex(ff => ff.id === f.id);
      if (fidx !== -1) DB.fulfillment[fidx] = {...f,
        customerName: r.customerName, businessName: r.businessName,
        customerEmail: r.customerEmail, customerPhone: r.customerPhone,
        customerAddress: r.customerAddress, customerCity: r.customerCity,
        customerState: r.customerState, customerZip: r.customerZip,
        customerType: r.customerType, liftgate: r.liftgate,
        machineName: r.machineName, serialNumber: r.serialNumber, invNumber: r.invNumber,
        carrier: r.shippingCompany, trackingNumber: r.trackingNumber, notes: r.notes,
      };
    });
    delete editSt['sold'];
    upsertCustomer(r);
    salesView = 'sold';
    _submitting = false; saveDB(); render();
  } else {
    upsertCustomer(r);
    _submitting = false; addRow('sold', r);
  }
}

If you ever need support, accessories, or anything else, don't hesitate to reach out.

Rock on! 🎰

Aaron Goldberg
San Diego Amusements
8670 Miramar Rd #A
San Diego, CA 92126
Cell: 858-205-3788
www.sandiegoamusements.com`;
}
