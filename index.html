function moveOrderInGame(orderId, direction) {
  const game = ((DB.pendingSales||[]).find(r => r.id === orderId)?.gameName||'').toUpperCase().trim();
  const indices = (DB.pendingSales||[]).reduce((acc, r, i) => {
    if ((r.gameName||'').toUpperCase().trim() === game) acc.push(i);
    return acc;
  }, []);
  const posInGroup = indices.findIndex(i => DB.pendingSales[i].id === orderId);
  const swapPos = posInGroup + direction;
  if (swapPos < 0 || swapPos >= indices.length) return;
  const idxA = indices[posInGroup];
  const idxB = indices[swapPos];
  [DB.pendingSales[idxA], DB.pendingSales[idxB]] = [DB.pendingSales[idxB], DB.pendingSales[idxA]];
  saveDB();
  render();
}
function promptMoveCustomer(orderId, customerName, currentGame) {
  const games = [...new Set((DB.pendingSales||[]).map(r => (r.gameName||'').toUpperCase().trim()))].filter(g => g && g !== currentGame.toUpperCase().trim()).sort();
  if (!games.length) { showToast('No other game categories to move to.'); return; }
  const choice = prompt(`Move "${customerName}" to which game?\n\nCurrent: ${currentGame}\n\nAvailable:\n${games.map((g,i)=>`${i+1}. ${g}`).join('\n')}\n\nType the number or game name:`);
  if (!choice || !choice.trim()) return;
  const num = parseInt(choice.trim());
  const target = (!isNaN(num) && num >= 1 && num <= games.length) ? games[num-1] : games.find(g => g.toLowerCase().includes(choice.trim().toLowerCase()));
  if (!target) { showToast('Game not found. Try again.', 'error'); return; }
  moveCustomerToGame(orderId, target);
}

// ── Pre-Order Game Category Management ─────────────────────────
function renameGame(oldName) {
  const newName = prompt(`Rename game category:\n"${oldName}"\n\nNew name:`, oldName);
  if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
  const trimmed = newName.trim().toUpperCase();
  // Check for conflicts
  const existingNames = [...new Set((DB.pendingSales||[]).map(r => (r.gameName||'').toUpperCase().trim()))];
  if (existingNames.includes(trimmed) && trimmed !== oldName.toUpperCase()) {
    if (!confirm(`"${trimmed}" already exists as a category. Orders will be merged with it. Continue?`)) return;
  }
  // Update all orders with this gameName
  let count = 0;
  DB.pendingSales = (DB.pendingSales||[]).map(r => {
    if ((r.gameName||'').toUpperCase().trim() === oldName.toUpperCase().trim()) {
      count++;
      return {...r, gameName: trimmed, updatedAt: new Date().toISOString()};
    }
    return r;
  });
  saveDB();
  showToast(`✅ Renamed "${oldName}" → "${trimmed}" (${count} orders updated)`);
  render();
}

function moveCustomerToGame(orderId, newGameName) {
  if (!newGameName) return;
  const order = (DB.pendingSales||[]).find(r => r.id === orderId);
  if (!order) return;
  const oldGame = order.gameName || '—';
  DB.pendingSales = (DB.pendingSales||[]).map(r =>
    r.id === orderId ? {...r, gameName: newGameName, updatedAt: new Date().toISOString()} : r
  );
  saveDB();
  showToast(`✅ Moved "${order.customerName||'order'}" from "${oldGame}" → "${newGameName}"`);
  render();
}

function addNewGameCategory() {
  const name = prompt('New game category name (will appear as a group on Pre-Orders):');
  if (!name || !name.trim()) return;
  const trimmed = name.trim().toUpperCase();
  // Check if it already exists
  const existingNames = [...new Set((DB.pendingSales||[]).map(r => (r.gameName||'').toUpperCase().trim()))];
  if (existingNames.includes(trimmed)) {
    showToast(`"${trimmed}" already exists — scrolling to it`);
    render();
    return;
  }
  // Pre-fill add form with this game name
  psEditing = {gameName: trimmed, forceGame: true};
  render();
  window.scrollTo(0, 0);
  setTimeout(() => {
    const inp = document.querySelector('input[name="gameName"]');
    if (inp) inp.value = trimmed;
  }, 50);
}

function psToSold(r) {
  if(!confirm('Mark as Sold and remove from Pre-Orders?')) return;
  const soldId = uid();
  const soldDate = today();
  // Look up cost from inventory using smart matching
  const invRef = findInventoryMatch(r.gameName, null, 'in_stock');
  const cost = invRef ? invRef.cost || '' : '';
  const margin = (r.price && cost) ? (Number(r.price) - Number(cost)).toFixed(2) : '';
  const inventoryId = invRef ? invRef.id : '';
  // Add sold record
  if (!DB.sold) DB.sold = [];
  DB.sold.unshift({
    id: soldId, createdAt: soldDate, inventoryId,
    machineName: r.gameName||'', serialNumber: invRef ? invRef.serialNumber||'' : '',
    customerName: r.customerName||'', businessName: r.businessName||'',
    customerEmail: r.customerEmail||'', customerPhone: r.customerPhone||'',
    customerAddress: r.customerAddress||'', customerCity: r.customerCity||'', customerState: r.customerState||r.state||'',
    customerZip: r.customerZip||'', customerType: r.customerType||'', liftgate: r.liftgate||'',
    salePrice: r.price||'', dateSold: soldDate,
    invNumber: r.invNumber||'', paymentStatus: r.paymentStatus||'PIF', paymentStage: r.paymentStage||'',
    shippingCompany:'', trackingNumber:'',
    condition:'New', cost, margin, notes: r.notes||'',
  });
  // Auto-create fulfillment record
  if (!DB.fulfillment) DB.fulfillment = [];
  DB.fulfillment.unshift({
    id: uid(), createdAt: soldDate, saleId: soldId, inventoryId,
    customerName: r.customerName||'', businessName: r.businessName||'',
    customerEmail: r.customerEmail||'', customerPhone: r.customerPhone||'',
    customerAddress: r.customerAddress||'', customerCity: r.customerCity||'', customerState: r.customerState||r.state||'',
    customerZip: r.customerZip||'', customerType: r.customerType||'', liftgate: r.liftgate||'',
    machineName: r.gameName||'', serialNumber: invRef ? invRef.serialNumber||'' : '',
    invNumber: r.invNumber||'', paymentStage: r.paymentStage||'', method: 'shipping', status: 'pending',
    carrier: '', trackingNumber: '', trackingLink: '', scheduledDate: '', notes: r.notes||'',
  });
  // Update inventory status to sold
  if (invRef) {
    const idx = DB.inventory.findIndex(i => i.id === invRef.id);
    if (idx !== -1) DB.inventory[idx] = {...invRef, status: 'sold', dateSold: soldDate};
  }
  // Remove from pre-orders — and delete from Firestore so it doesn't come back
  const psId = r.id;
  DB.pendingSales = DB.pendingSales.filter(x => x.id !== r.id);
  upsertCustomer(r);
  salesView = 'sold';
  saveDB();
  if (window._fbReady && window._fbUser && window._fbDeleteRecord) {
    window._fbDeleteRecord('pendingSales', psId).catch(e => console.warn('[SDA] delete pendingSale error:', e));
  }
  goto('sales');
}

function renderShopifyGameMatch(item, oi, li) {
  const q = item.rawName.toLowerCase();
  const matches = (DB.inventory||[])
    .filter(inv => inv.status !== 'sold')
    .map(inv => ({inv, score: fuzzyScore(q, (inv.machineName||'').toLowerCase())}))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);
  const matched = item._matchId ? (DB.inventory||[]).find(i => i.id === item._matchId) : null;
  return `<select onchange="shopifyOrders[${oi}].lineItems[${li}]._matchId=this.value" style="padding:5px 8px;border-radius:6px;border:1px solid ${matched?'var(--green)':'var(--yellow)'};background:var(--bg);color:var(--text);font-size:12px;max-width:220px">
    <option value="">— Pick inventory match —</option>
    ${matches.map(({inv}) => `<option value="${inv.id}" ${item._matchId===inv.id?'selected':''}>${inv.machineName}${inv.serialNumber?' #'+inv.serialNumber:''}</option>`).join('')}
    <option value="__new__" ${item._matchId==='__new__'?'selected':''}>+ Not in inventory yet</option>
  </select>`;
}

function renderShopifyPartMatch(item, oi, li) {
  const q = item.rawName.toLowerCase();
  const matches = (DB.parts||[])
    .map(p => ({p, score: fuzzyScore(q, (p.itemName||'').toLowerCase())}))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);
  const matched = item._matchId ? (DB.parts||[]).find(p => p.id === item._matchId) : null;
  return `<select onchange="shopifyOrders[${oi}].lineItems[${li}]._matchId=this.value" style="padding:5px 8px;border-radius:6px;border:1px solid ${matched?'var(--green)':'var(--yellow)'};background:var(--bg);color:var(--text);font-size:12px;max-width:220px">
    <option value="">— Pick part match —</option>
    ${matches.map(({p}) => `<option value="${p.id}" ${item._matchId===p.id?'selected':''}>${p.itemName} (${Number(p.onHand||0)} on hand)</option>`).join('')}
    <option value="__new__" ${item._matchId==='__new__'?'selected':''}>+ Not in parts list</option>
  </select>`;
}

function fuzzyScore(query, target) {
  if (!query || !target) return 0;
  if (target.includes(query)) return 100;
  const qWords = query.split(/\s+/).filter(w => w.length > 2);
  let score = 0;
  qWords.forEach(w => { if (target.includes(w)) score += 10; });
  return score;
}

function convertShopifyOrder(oi) {
  const order = shopifyOrders[oi];
  if (!order) return;
  const gameItems = (order.lineItems||[]).filter(i => i._type === 'game');
  const partItems = (order.lineItems||[]).filter(i => i._type === 'part');
  // Build sale record
  const liftgate = (order.shippingMethod||'').toLowerCase().includes('liftgate') 
    ? ((order.shippingMethod||'').toLowerCase().includes('residential') ? 'Yes - Residential' : 'Yes') 
    : 'No';
  const primaryGame = gameItems[0];
  const invItem = primaryGame?._matchId && primaryGame._matchId !== '__new__'
    ? (DB.inventory||[]).find(i => i.id === primaryGame._matchId) : null;
  const newSaleId = uid();
  const saleRecord = {
    id: newSaleId,
    createdAt: today(),
    machineName: invItem?.machineName || primaryGame?.rawName || '',
    serialNumber: invItem?.serialNumber || '',
    inventoryId: invItem?.id || '',
    shopifyOrderNum: order.shopifyOrderNum || '',
    invNumber: '',
    salePrice: order.subtotal || '',
    saleDate: order.orderDate || today(),
    status: 'open',
    paymentStatus: 'Shopify',
    customerName: order.customerName || '',
    customerEmail: order.customerEmail || '',
    customerPhone: order.customerPhone || '',
    customerAddress: order.customerAddress || '',
    customerCity: order.customerCity || '',
    customerState: order.customerState || '',
    customerZip: order.customerZip || '',
    customerType: liftgate.includes('Residential') ? 'Residential' : '',
    liftgate,
    shippingCompany: '',
    trackingNumber: '',
    trackingLink: '',
    shippingStatus: 'pending',
    notes: `Shopify order ${esc(order.shopifyOrderNum||'')}. Shipping: $${order.shippingCost||0}. Total: ${order.total||''}`,
    additionalGames: gameItems.slice(1).map(g => {
      const inv2 = g._matchId && g._matchId !== '__new__' ? (DB.inventory||[]).find(i => i.id === g._matchId) : null;
      return { machineName: inv2?.machineName || g.rawName, serialNumber: inv2?.serialNumber || '' };
    }),
    salePartsLines: partItems.filter(p => p._matchId && p._matchId !== '__new__').map(p => {
      const part = (DB.parts||[]).find(pt => pt.id === p._matchId);
      return { itemName: part?.itemName || p.rawName, partId: p._matchId, qty: p.qty || 1, price: p.price || 0, includeInFulfillment: false };
    }),
    hasShipTo: '', shipToName: '', shipToPhone: '', shipToAddress: '', shipToCity: '', shipToState: '', shipToZip: '',
  };
  // Mark inventory reserved
  if (invItem) {
    const idx = DB.inventory.findIndex(i => i.id === invItem.id);
    if (idx !== -1 && DB.inventory[idx].status !== 'sold') DB.inventory[idx] = {...DB.inventory[idx], status: 'reserved', updatedAt: new Date().toISOString()};
  }
  // Deduct parts
  applyPartsDeduction(saleRecord.salePartsLines, newSaleId, '');
  // Create sale
  if (!DB.sales) DB.sales = [];
  DB.sales.unshift(saleRecord);
  // Create fulfillment
  if (!DB.fulfillment) DB.fulfillment = [];
  DB.fulfillment.unshift({
    id: uid(), createdAt: today(), saleId: newSaleId,
    inventoryId: saleRecord.inventoryId,
    customerName: saleRecord.customerName, businessName: '',
    customerEmail: saleRecord.customerEmail, customerPhone: saleRecord.customerPhone,
    customerAddress: saleRecord.customerAddress, customerCity: saleRecord.customerCity,
    customerState: saleRecord.customerState, customerZip: saleRecord.customerZip,
    customerType: saleRecord.customerType, liftgate: saleRecord.liftgate,
    machineName: saleRecord.machineName, serialNumber: saleRecord.serialNumber,
    invNumber: '', method: 'shipping', status: 'pending',
    carrier: '', trackingNumber: '', trackingLink: '', scheduledDate: '', notes: saleRecord.notes,
    hasShipTo: '', shipToName: '', shipToPhone: '', shipToAddress: '', shipToCity: '', shipToState: '', shipToZip: '',
  });
  upsertCustomer(saleRecord);
  shopifyOrders[oi]._status = 'converted';
  saveDB();
  showToast(`✅ Order ${esc(order.shopifyOrderNum||'')} converted to sale!`);
  render();
}

function showShopifyCatPicker(oi) {

function dismissShopifyOrder(oi) {
  const order = shopifyOrders[oi];
  if (!order) return;
  // Persist as an object with .id so Firestore can save it (plain strings have no .id and silently fail)
  if (order.shopifyOrderNum) {
    const orderNum = order.shopifyOrderNum;
    shopifyDismissed.add(orderNum);
    if (!DB.shopifyDismissed) DB.shopifyDismissed = [];
    const alreadyIn = DB.shopifyDismissed.some(r => (r.id || r) === orderNum);
    if (!alreadyIn) {
      const rec = {id: orderNum, orderNum, dismissedAt: new Date().toISOString()};
      DB.shopifyDismissed.push(rec);
      saveDB('shopifyDismissed', orderNum); // targeted save — guaranteed to reach Firestore
    }
  }
  shopifyOrders.splice(oi, 1);
  render();
}

function convertShopifyToPreOrder(oi) {
  const order = shopifyOrders[oi];
  if (!order) return;

  // Get or prompt for category
  const catSel = document.getElementById(`shopify-cat-${oi}`);
  let category = catSel ? catSel.value : '';
  if (category === '__new__') {
    category = prompt('Enter a category name for this pre-order:') || '';
    if (!category.trim()) { showToast('Category required for pre-order.', 'error'); return; }
    category = category.trim();
  }
  if (!category) {
    showToast('Please select or enter a category first.', 'error');
    return;
  }

  const liftgate = (order.shippingMethod||'').toLowerCase().includes('liftgate')
    ? ((order.shippingMethod||'').toLowerCase().includes('residential') ? 'Yes - Residential' : 'Yes')
    : 'No';

  // Create a pre-order entry per game line item (or one generic if no games)
  const gameItems = (order.lineItems||[]).filter(i => i._type === 'game');
  const itemsToCreate = gameItems.length ? gameItems : [{rawName: '', qty: 1, price: order.subtotal || 0}];

  if (!DB.pendingSales) DB.pendingSales = [];
  itemsToCreate.forEach(item => {
    DB.pendingSales.unshift({
      id: uid(), createdAt: today(),
      category,
      gameName: category,
      customerName: order.customerName || '',
      customerEmail: order.customerEmail || '',
      customerPhone: order.customerPhone || '',
      customerAddress: order.customerAddress || '',
      customerCity: order.customerCity || '',
      customerState: order.customerState || '',
      customerZip: order.customerZip || '',
      liftgate,
      state: order.customerState || '',
      model: '', price: order.subtotal || item.price || '',
      paymentStatus: 'Shopify',
      paymentNotes: '', depositAmount: '',
      shopifyOrderNum: order.shopifyOrderNum || '',
      notes: `Shopify order ${esc(order.shopifyOrderNum||'')}. Total: ${order.total||''}`,
      invNumber: '',
    });
  });

  upsertCustomer({
    customerName: order.customerName, customerEmail: order.customerEmail,
    customerPhone: order.customerPhone, customerAddress: order.customerAddress,
    customerCity: order.customerCity, customerState: order.customerState,
    customerZip: order.customerZip,
  });

  // Remove from the visible list immediately
  shopifyOrders.splice(oi, 1);

  // Permanently dismiss so it never re-appears after a Gmail re-fetch
  if (order.shopifyOrderNum) {
    const orderNum = order.shopifyOrderNum;
    shopifyDismissed.add(orderNum);
    if (!DB.shopifyDismissed) DB.shopifyDismissed = [];
    const alreadyIn = DB.shopifyDismissed.some(r => (r.id || r) === orderNum);
    if (!alreadyIn) {
      DB.shopifyDismissed.push({id: orderNum, orderNum, dismissedAt: new Date().toISOString()});
    }
  }

  saveDB();
  showToast(`✅ Order ${esc(order.shopifyOrderNum||'')} added to Pre-Orders → ${category}!`);
  render();
}

async function fetchShopifyFromGmail() {
  const btn = document.getElementById('shopify-fetch-btn');
  if (!SYNC_URL) {
    showToast('⚠️ Apps Script URL not configured. Set SYNC_URL at the top of index.html.', 'error');
    return;
  }
  if (btn) { btn.textContent = '⏳ Checking Gmail…'; btn.disabled = true; }
  try {
    // Call Google Apps Script which has Gmail access server-side
    const response = await fetch(`${SYNC_URL}?action=getOrders&token=${encodeURIComponent(SYNC_TOKEN)}`, {method:'GET'});
    if (!response.ok) { showToast('❌ Server error ' + response.status + '. Check Apps Script deployment.', 'error'); return; }
    const json = await response.json();
    // Accept both plain array (old script) and {ok:true, orders:[]} (new script)
    const rawOrders = Array.isArray(json) ? json : (json && Array.isArray(json.orders) ? json.orders : null);
    if (!rawOrders) { showToast('❌ Unexpected response from Apps Script: ' + JSON.stringify(json).slice(0,120), 'error'); return; }
    if (!rawOrders.length) { showToast('No new Shopify orders found in Gmail.', 'info'); return; }
    // Convert Apps Script format to app format
    // Sanitize all fields from external source before storing/rendering
    const clean = (v, max) => String(v ?? '').trim().slice(0, max || 500);
    const orders = rawOrders.map(o => ({
      shopifyOrderNum: '#' + clean(o.orderNumber, 20),
      customerName: clean(o.customerName || o.placedBy, 200),
      customerEmail: clean(o.customerEmail, 200),
      customerPhone: clean(o.customerPhone, 50),
      customerAddress: clean(o.customerAddress || o.address, 300),
      customerCity: clean(o.customerCity || o.city, 100),
      customerState: clean(o.customerState || o.state, 50),
      customerZip: clean(o.customerZip || o.zip, 20),
      orderDate: clean(o.date || o.orderDate, 10),
      shippingMethod: clean(o.shippingMethod || o.shippingType, 100),
      shippingCost: parseFloat(o.shipping || o.shippingCost || 0),
      subtotal: parseFloat(o.subtotal || o.salePrice || 0),
      total: o.total ? '$' + clean(o.total, 30) : '',
      liftgate: clean(o.liftgate, 10),
      lineItems: (o.items && o.items.length ? o.items.map(item => ({
        rawName: clean(item.name, 300),
        qty: parseInt(item.qty||1),
        price: parseFloat(item.price||0)
      })) : [{
        rawName: clean(o.productName, 300),
        qty: parseInt(o.quantity||1),
        price: parseFloat(o.subtotal || o.salePrice || 0)
      }]),
      _status: 'pending',
      _msgId: o.msgId,
      _shopifyUrl: o.shopifyUrl
    }));
    // Auto-classify and fuzzy match line items
    orders.forEach(order => {
      (order.lineItems||[]).forEach(item => {
        const name = (item.rawName||'').toLowerCase();
        const gameKeywords = ['pinball','machine','stern','jersey jack','spooky','chicago gaming'];
        const isGame = gameKeywords.some(k => name.includes(k)) || Number(item.price||0) > 500;
        item._type = isGame ? 'game' : 'part';
        if (isGame) {
          const best = (DB.inventory||[])
            .filter(inv => inv.status !== 'sold')
            .map(inv => ({inv, score: fuzzyScore(name, (inv.machineName||'').toLowerCase())}))
            .filter(x => x.score > 0)
            .sort((a,b) => b.score - a.score)[0];
          item._matchId = best ? best.inv.id : '';
        } else {
          const best = (DB.parts||[])
            .map(p => ({p, score: fuzzyScore(name, (p.itemName||'').toLowerCase())}))
            .filter(x => x.score > 0)
            .sort((a,b) => b.score - a.score)[0];
          item._matchId = best ? best.p.id : '';
        }
      });
    });
    // Merge — avoid duplicates and already-dismissed orders
    const existingNums = new Set(shopifyOrders.map(o => o.shopifyOrderNum));
    const dismissed = new Set((DB.shopifyDismissed || []).map(r => r.id || r));
    const newOrders = orders.filter(o => !existingNums.has(o.shopifyOrderNum) && !dismissed.has(o.shopifyOrderNum));
    shopifyOrders = [...newOrders, ...shopifyOrders];
    showToast(`✅ Found ${newOrders.length} new order${newOrders.length!==1?'s':''}!`);
    render();
  } catch(err) {
    showToast('❌ Gmail fetch failed. Check console.', 'error');
    console.error('Shopify Gmail error:', err);
  } finally {
    if (btn) { btn.textContent = '📬 Check Gmail for New Orders'; btn.disabled = false; }
  }
}

// ── TOAST NOTIFICATION ───────────────────────────────────────
function showToast(msg, type='success') {
  let t = document.getElementById('sda-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'sda-toast';
    t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;box-shadow:0 4px 24px rgba(0,0,0,0.35);transition:opacity .4s;max-width:90vw;text-align:center;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.style.background = type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : '#555';
  t.style.color = '#fff';
  t.style.opacity = '1';
  t.textContent = msg;
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 3800);
}

function submitSold(e) {
  e.preventDefault();
  if (_submitting) return;
  _submitting = true;
  const r = Object.fromEntries(new FormData(e.target));
  if (editSt['sold']) {
    const editingId = editSt['sold'].id;
    // Update sold record in DB directly (no render yet)
    DB.sold = DB.sold.map(x => x.id === editingId ? {...x, ...r} : x);
    // Sync address fields to linked fulfillment record BEFORE render
    const linkedFulfil = (DB.fulfillment||[]).filter(f => f.saleId === editingId);
    linkedFulfil.forEach(f => {
      const fidx = DB.fulfillment.findIndex(ff => ff.id === f.id);
      if (fidx !== -1) DB.fulfillment[fidx] = {...f,
        customerName: r.customerName, businessName: r.businessName,
        customerEmail: r.customerEmail, customerPhone: r.customerPhone,
        customerAddress: r.customerAddress, customerCity: r.customerCity,
        customerState: r.customerState, customerZip: r.customerZip,
        customerType: r.customerType, liftgate: r.liftgate,
        machineName: r.machineName, serialNumber: r.serialNumber, invNumber: r.invNumber,
        carrier: r.shippingCompany, trackingNumber: r.trackingNumber, notes: r.notes,
      };
    });
    delete editSt['sold'];
    upsertCustomer(r);
    salesView = 'sold';
    _submitting = false; saveDB(); render();
  } else {
    upsertCustomer(r);
    _submitting = false; addRow('sold', r);
  }
}

// Live-update email preview as user edits fulfillment form fields
function fulfillmentFieldChanged() {
  const panel = document.getElementById('fulfil-email-panel');
  const form  = document.querySelector('form[onsubmit*="fulfillment"]');
  if (!form) return;

  const fd  = Object.fromEntries(new FormData(form));
  const rec = {...(editSt['fulfillment']||{}), ...fd};

  // Auto-build tracking link from carrier + tracking number and fill form field
  const autoLink = buildTrackingUrl(fd.carrier, fd.trackingNumber);
  const trackingLinkInput = form.querySelector('[name="trackingLink"]');
  if (trackingLinkInput && autoLink && !trackingLinkInput.value) {
    trackingLinkInput.value = autoLink;
    rec.trackingLink = autoLink;
  } else if (trackingLinkInput && autoLink) {
    // Always update if carrier/tracking changed and current value looks auto-generated
    const currentVal = trackingLinkInput.value;
    const isAutoGenerated = currentVal.includes('tforcefreight.com') ||
      currentVal.includes('rlcarriers.com') || currentVal.includes('estes-express.com') ||
      currentVal.includes('mydaylight.dylt.com') || currentVal.includes('totaltransportation.com') || currentVal.includes('carrierlogistics.com') ||
      currentVal.includes('odfl.com') || currentVal.includes('ltl-xpo.com') ||
      currentVal.includes('forwardair.com') || currentVal.includes('daytonfreight.com') ||
      currentVal.includes('pittohio.com') || currentVal.includes('arcb.com') ||
      currentVal.includes('rrts.com') || currentVal.includes('oakharbor.com') ||
      currentVal.includes('suttontransport.com') || currentVal.includes('taxairfreight.com') ||
      currentVal.includes('magnumltl.com') || currentVal.includes('mve1.com') ||
      currentVal.includes('mydaylight.dylt.com') || currentVal.includes('totaltransportation.com') || currentVal.includes('carrierlogistics.com') ||
      currentVal.includes('dedicateddelivery.com') ||
      currentVal.includes('fedex.com/fedextrack') ||
      currentVal.includes('ups.com/track') || currentVal.includes('usps.com');
    if (isAutoGenerated) {
      trackingLinkInput.value = autoLink;
      rec.trackingLink = autoLink;
    }
  }

  // Auto-fill ship date with today when tracking number is first entered
  const shipDateInput = form.querySelector('[name="scheduledDate"]');
  if (shipDateInput && fd.trackingNumber && !shipDateInput.value) {
    shipDateInput.value = today();
    rec.scheduledDate = today();
  }

  if (!panel) return;

  const subj = rec.machineName
    ? `Your ${rec.machineName} Has Shipped!${rec.invNumber ? ' — INV #' + rec.invNumber : ''}`
    : 'Your Order Has Shipped!';
  const body = buildEmailPreview(rec);

  const subjEl = document.getElementById('fep-subj');
  const bodyEl = document.getElementById('fep-body');
  const toEl   = document.getElementById('fep-to');
  if (subjEl) subjEl.value = subj;
  if (bodyEl) bodyEl.value = body;
  if (toEl && fd.customerEmail) toEl.value = fd.customerEmail;
}

function sendTrackingEmail(rec) {
  const to      = (rec.customerEmail || '').trim();
  const machine = rec.machineName || 'your pinball machine';
  const subject = `Your ${machine} Has Shipped!${rec.invNumber ? ' — INV #' + rec.invNumber : ''}`;
  const body    = buildEmailPreview(rec);

  if (!to) { showToast('⚠️ No customer email on this record.', 'error'); return; }

  const gmailUrl = 'https://mail.google.com/mail/?view=cm'
    + '&to='   + encodeURIComponent(to)
    + '&su='   + encodeURIComponent(subject)
    + '&body=' + encodeURIComponent(body);

  // Use anchor click to avoid popup blockers
  const a = document.createElement('a');
  a.href = gmailUrl;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Stamp emailSentDate
  const sentDate = today();
  const idx = DB.fulfillment.findIndex(r => r.id === rec.id);
  if (idx !== -1) {
    DB.fulfillment[idx] = { ...DB.fulfillment[idx], emailSentDate: sentDate };
    const saleId = DB.fulfillment[idx].saleId;
    if (saleId) {
      const si = (DB.sales||[]).findIndex(s => s.id === saleId);
      if (si !== -1) DB.sales[si] = {...DB.sales[si], emailSentDate: sentDate};
      const so = (DB.sold||[]).findIndex(s => s.id === saleId);
      if (so !== -1) DB.sold[so] = {...DB.sold[so], emailSentDate: sentDate};
    }
    saveDB(); render();
  }
  showToast('✅ Gmail opened — email marked as sent.', 'success');
}

// ── INVOICE PDF AUTO-FILL (browser parser, no API needed) ────
async function extractInvoiceData(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('invoice-extract-status');
  const setStatus = (color, msg) => { if (status) { status.style.color = color; status.textContent = msg; } };
  setStatus('var(--yellow)', '⏳ Reading invoice…');

  try {
    // Load PDF.js from CDN if not already loaded
    if (!window.pdfjsLib) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    // Read file as ArrayBuffer
    const arrayBuffer = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error('File read failed'));
      r.readAsArrayBuffer(file);
    });

    // Extract all text from PDF
    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      // Group items by y-position (PDF coords are bottom-up, same line items have same y)
      // Bucket y values to handle minor float variations on the same line
      const lineMap = new Map();
      for (const item of content.items) {
        if (!item.str || !item.str.trim()) continue;
        const y = Math.round(item.transform[5]); // round to nearest integer
        if (!lineMap.has(y)) lineMap.set(y, []);
        lineMap.get(y).push({ x: item.transform[4], str: item.str.trim() });
      }
      // Sort lines by y descending (PDF y=0 is bottom, so higher y = higher on page)
      const sortedYs = Array.from(lineMap.keys()).sort((a, b) => b - a);
      for (const y of sortedYs) {
        // Sort items on the same line by x position left-to-right
        const items = lineMap.get(y).sort((a, b) => a.x - b.x);
        fullText += items.map(i => i.str).join(' ') + '\n';
      }
    }
    console.log('=== PDF LINES ===\n' + fullText + '\n=== END ===');

    // Parse the extracted text using SDA invoice format
    const fields = parseSDAInvoice(fullText);

    // Populate the form
    const form = document.querySelector('form[onsubmit*="submitSale"]');
    if (!form) throw new Error('Sales form not found');

    const set = (name, val) => {
      if (!val) return;
      const el = form.querySelector(`[name="${name}"]`);
      if (el) el.value = val;
    };

    set('customerName',    fields.customerName);
    set('customerEmail',   fields.customerEmail);
    set('customerPhone',   fields.customerPhone);
    set('customerAddress', fields.customerAddress);
    set('customerCity',    fields.customerCity);
    set('customerState',   fields.customerState);
    set('customerZip',     fields.customerZip);
    set('machineName',     fields.machineName);
    set('invNumber',       fields.invNumber);
    set('salePrice',       fields.salePrice);
    set('saleDate',        fields.saleDate);
    set('paymentStatus',   fields.paymentStatus);
    set('notes',           fields.notes);

    // Also set address fields directly by ID (the addr-* IDs are separate from name attrs)
    const setId = (id, val) => { if (!val) return; const el = document.getElementById(id); if (el) el.value = val; };
    setId('addr-street', fields.customerAddress);
    setId('addr-city',   fields.customerCity);
    setId('addr-state',  fields.customerState);
    setId('addr-zip',    fields.customerZip);
    // Populate the address search bar with the full address so it's visible
    if (fields.customerAddress) {
      const fullAddr = [fields.customerAddress, fields.customerCity, fields.customerState, fields.customerZip].filter(Boolean).join(', ');
      setId('addr-full', fullAddr);
    }

    const filled = Object.values(fields).filter(v => v).length;
    setStatus('var(--green)', `✅ Filled ${filled} fields — review and save`);
    showToast(`✅ Invoice parsed — ${filled} fields filled!`);

    // Check if parsed machine name matches inventory — show picker if not found
    if (fields.machineName) {
      const mn = fields.machineName.toLowerCase().trim();
      const exactMatch = (DB.inventory||[]).find(i =>
        i.status !== 'sold' && (i.machineName||'').toLowerCase().trim() === mn
      );
      if (!exactMatch) {
        // Find close matches
        const fuzzy = (DB.inventory||[]).filter(i =>
          i.status !== 'sold' && (
            (i.machineName||'').toLowerCase().includes(mn.slice(0,6)) ||
            mn.includes((i.machineName||'').toLowerCase().slice(0,6))
          )
        ).slice(0, 8);
        showInvoiceMachinePicker(fields.machineName, fuzzy, form);
      }
    }

  } catch(err) {
    console.error('Invoice parse error:', err);
    setStatus('var(--red)', '⚠️ ' + (err.message || 'Could not read PDF'));
    showToast('⚠️ Could not parse invoice', 'error');
  }
}

      <div style="display:flex;gap:8px;margin-top:16px">

          Keep "${esc(parsedName.slice(0,20))}…"

}

function filterInvPicker(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('#inv-picker-list button').forEach(btn => {
    btn.style.display = btn.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function selectInvoiceMachine(name) {
  // Set the machine name field in the sales form
  const form = document.querySelector('form[onsubmit*="submitSale"]');
  if (!form) return;
  const el = form.querySelector('[name="machineName"]') || document.getElementById('pi-sale-title');
  if (el) {
    el.value = name;
    // Trigger the serial dropdown to refresh
    if (typeof onSaleTitleSelect === 'function') onSaleTitleSelect(name);
  }
  showToast(`✅ Machine set to: ${name}`);
}

function parseSDAInvoice(rawText) {
  const fields = {};
  const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);
  const flat  = lines.join(' '); // full text as one string for fallback regex

  console.log('Parsed lines:', lines);

  // ── Invoice # ────────────────────────────────────────────────
  // Strategy 1: line after "Invoice #" contains "date number"
  for (let i = 0; i < lines.length; i++) {
    if (/Invoice\s*#/i.test(lines[i])) {
      // Check same line first: "Invoice # 1520"
      const same = lines[i].match(/Invoice\s*#\s*(\d{3,})/i);
      if (same) { fields.invNumber = same[1]; }
      // Check next line: "3/7/2026 1520"
      if (!fields.invNumber && i+1 < lines.length) {
        const next = lines[i+1].match(/(\d{1,2}\/\d{1,2}\/\d{4})\s+(\d{3,})/);
        if (next) {
          fields.invNumber = next[2];
          const p = next[1].split('/');
          fields.saleDate = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
        }
      }
      break;
    }
  }
  // Strategy 2: scan all lines for "date number" pattern near top
  if (!fields.invNumber) {
    for (const line of lines.slice(0, 10)) {
      const m = line.match(/^(\d{1,2}\/\d{1,2}\/\d{4})\s+(\d{3,})$/);
      if (m) {
        fields.invNumber = m[2];
        const p = m[1].split('/');
        fields.saleDate = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
        break;
      }
    }
  }

  // ── Date (if not found with invoice #) ──────────────────────
  if (!fields.saleDate) {
    // Look for standalone date line like "3/7/2026"
    for (const line of lines.slice(0, 15)) {
      const m = line.match(/^(\d{1,2}\/\d{1,2}\/\d{4})$/);
      if (m) {
        const p = m[1].split('/');
        fields.saleDate = `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
        break;
      }
    }
  }

  // ── Bill To block ────────────────────────────────────────────
  // Find "Bill To" line then extract next few lines
  for (let i = 0; i < lines.length; i++) {
    if (/Bill\s+To/i.test(lines[i])) {
      // Collect lines until "Terms" or "Item Code" or empty-looking break
      const block = [];
      for (let j = i+1; j < Math.min(i+8, lines.length); j++) {
        if (/^(Terms|Ship\s+Via|Item\s+Code)/i.test(lines[j])) break;
        block.push(lines[j]);
      }

      // Each line may be "Value Value" (Bill To + Ship To side by side)
      // Dedup: if first half === second half, take first half
      const dedup = (line) => {
        if (!line) return '';
        const w = line.trim().split(/\s+/);
        const h = Math.floor(w.length / 2);
        if (h > 0 && w.slice(0,h).join(' ') === w.slice(h).join(' ')) return w.slice(0,h).join(' ');
        return line.trim();
      };

      // Name — first block line that doesn't look like an address or phone
      for (const bline of block) {
        const d = dedup(bline);
        if (!d) continue;
        // Skip if it looks like address (has number+street), phone, email, city/state
        if (/^\d+\s+\w/.test(d)) continue; // street address starts with number
        if (/^\d{3}[-.\s]\d{3}/.test(d)) continue; // phone
        if (/@/.test(d)) continue; // email
        if (/,\s*[A-Z]{2}\s+\d{5}/.test(d)) continue; // city,state zip
        if (!fields.customerName && d.length > 2) { fields.customerName = d; continue; }
        break;
      }

      // Address — line starting with a number (street number)
      for (const bline of block) {
        const d = dedup(bline);
        if (/^\d+\s+/.test(d) && !/,\s*[A-Z]{2}\s+\d{5}/.test(d)) {
          fields.customerAddress = d; break;
        }
      }

      // City/State/Zip — "City, ST 12345" or "City ST 12345" (with or without comma, state may be mixed case)
      for (const bline of block) {
        const d = dedup(bline);
        // With comma: "Fountain Hills, AZ 85268" or "Phoenix, Az 85048"
        const csz1 = d.match(/^(.+?),\s*([A-Za-z]{2})\s+(\d{5}(?:-\d{4})?)/);
        // Without comma: "Fountain Hills AZ 85268"
        const csz2 = d.match(/^(.+?)\s+([A-Za-z]{2})\s+(\d{5}(?:-\d{4})?)$/);
        const csz = csz1 || csz2;
        if (csz) { fields.customerCity=csz[1].trim(); fields.customerState=csz[2].toUpperCase(); fields.customerZip=csz[3]; break; }
      }

      // Phone — standalone phone line
      for (const bline of block) {
        const d = dedup(bline);
        if (/^\(?\d{3}\)?[-.\s]\d{3}[-.\s]\d{4}$/.test(d)) { fields.customerPhone = d; break; }
      }

      // Email
      for (const bline of block) {
        const d = dedup(bline);
        if (/^[\w.+-]+@[\w-]+\.[a-z]{2,}$/i.test(d)) { fields.customerEmail = d; break; }
      }
      break;
    }
  }

  // ── Fallback: email/phone anywhere in text ───────────────────
  if (!fields.customerEmail) {
    const em = flat.match(/[\w.+-]+@[\w-]+\.[a-z]{2,}/i);
    if (em) fields.customerEmail = em[0];
  }
  if (!fields.customerPhone) {
    // Skip SDA's number
    const phones = [...flat.matchAll(/\b(\(?\d{3}\)?[-.\s]\d{3}[-.\s]\d{4})\b/g)].map(m=>m[1]);
    const notSDA = phones.find(p => !p.replace(/\D/g,'').startsWith('8582053788'));
    if (notSDA) fields.customerPhone = notSDA;
  }

  // ── Machine Name ─────────────────────────────────────────────
  let inItems = false;
  for (const line of lines) {
    if (/Item\s*Code/i.test(line)) { inItems = true; continue; }
    if (!inItems) continue;
    if (/^(shipping|deposit|discount|sales\s*tax|total|balance|payments)/i.test(line.trim())) continue;
    if (/[\d,]+\.\d{2}/.test(line)) {
      let name = line
        .replace(/\s+[\d,]+\.\d{2}T?\s+[\d,]+\.\d{2}T?\s*$/, '')  // strip both price cols
        .replace(/\s+[\d,]+\.\d{2}T?\s*$/, '')                       // strip single price
        .trim();
      // Strip item code prefix like "Raw Thrills Game " or "Stern Game "
      name = name.replace(/^[\w][\w\s\-]*?\bGame\b\s+/i, '').trim();
      // Also strip if first token is a known item code pattern (all caps word)
      name = name.replace(/^[A-Z]{2,}\s+[A-Z]{2,}\s+/, '').trim();
      if (name.length > 2) { fields.machineName = name; break; }
    }
  }

  // ── Balance Due ──────────────────────────────────────────────
  // Scan every line — "Balance Due $6,920.05" or "Balance Due" then next line has amount
  for (let i = 0; i < lines.length; i++) {
    if (/Balance\s*Due/i.test(lines[i])) {
      const same = lines[i].match(/Balance\s*Due\s+\$?([\d,]+\.\d{2})/i);
      if (same) {
        fields.salePrice = same[1].replace(/,/g,'');
        fields.paymentStatus = parseFloat(fields.salePrice) === 0 ? 'PIF' : 'PEND PYMN';
        break;
      }
      const next = (lines[i+1]||'').match(/^\$?([\d,]+\.\d{2})$/);
      if (next) {
        fields.salePrice = next[1].replace(/,/g,'');
        fields.paymentStatus = parseFloat(fields.salePrice) === 0 ? 'PIF' : 'PEND PYMN';
        break;
      }
    }
  }
  // Fallback to Total
  if (!fields.salePrice) {
    for (let i = 0; i < lines.length; i++) {
      if (/\bTotal\b/.test(lines[i]) && !/Sales\s*Tax/i.test(lines[i])) {
        const sm = lines[i].match(/Total\s+\$?([\d,]+\.\d{2})/i);
        if (sm) { fields.salePrice = sm[1].replace(/,/g,''); fields.paymentStatus = 'PEND PYMN'; break; }
        const nm = (lines[i+1]||'').match(/^\$?([\d,]+\.\d{2})$/);
        if (nm) { fields.salePrice = nm[1].replace(/,/g,''); fields.paymentStatus = 'PEND PYMN'; break; }
      }
    }
  }
  // Last resort — flat text
  if (!fields.salePrice) {
    const bm = flat.match(/Balance\s*Due\s+\$?([\d,]+\.\d{2})/i);
    if (bm) { fields.salePrice = bm[1].replace(/,/g,''); fields.paymentStatus = parseFloat(fields.salePrice)===0?'PIF':'PEND PYMN'; }
  }

  console.log('Parsed fields:', fields);
  return fields;
}

function renderPartOrders() {
  if (!DB.partOrders) DB.partOrders = [];
  const orders = partOrderView === 'active'
    ? DB.partOrders.filter(o => !['received','cancelled'].includes(o.status))
    : DB.partOrders;

  const statusBadgeMap = {
    ordered:    'bg-blue',
    backordered:'bg-orange',
    shipped:    'bg-purple',
    received:   'bg-green',
    cancelled:  'bg-red',
  };

  // Group parts by game for organized dropdown
  const gameGroups = {};
  STERN_KNOWN_PARTS.forEach(p => {
    const g = p.game || 'Other';
    if (!gameGroups[g]) gameGroups[g] = [];
    gameGroups[g].push(p);
  });
  const knownOpts = '<option value="">— Select a known Stern part —</option>' +
    Object.entries(gameGroups).map(([game, parts]) =>
      `<optgroup label="${esc(game)}">`+
      parts.map(p => {
        const costStr = p.cost ? ' — $'+p.cost+' wholesale' : '';
        return `<option value="${esc(p.name)}" data-part-id="${esc(p.id)}" data-cost="${p.cost||''}" data-stockstatus="${esc(p.stockStatus||'')}" data-notes="${esc(p.notes||'')}">${esc(p.name)}${p.id?' ('+p.id+')':''}${costStr}</option>`;
      }).join('')+
      '</optgroup>'
    ).join('');

  const rec = partOrderEditing || {};

  return `
  <h1 class="pt">📦 Part Orders</h1>

  <!-- ORDER FORM -->
  <div class="panel">
    <h3 style="font-size:13px;font-weight:800;margin-bottom:14px">${partOrderEditing ? '✏️ Edit Order' : '➕ New Parts Order'}</h3>
    <form onsubmit="submitPartOrder(event)">

      ${partOrderEditing ? `
      <!-- EDIT MODE: single item fields -->
      <div class="grid">
        <div class="fw"><label class="fl">ITEM NAME</label><input name="itemName" value="${esc(rec.itemName||'')}" required></div>
        <div class="fw"><label class="fl">PART ID</label><input name="partId" value="${esc(rec.partId||'')}" style="font-family:monospace"></div>
        <div class="fw"><label class="fl">QTY</label><input type="number" name="qty" min="1" value="${rec.qty||1}" required></div>
        <div class="fw"><label class="fl">STATUS</label>
          <select name="status">
            ${['ordered','backordered','shipped','received','cancelled'].map(s=>`<option value="${s}"${(rec.status||'ordered')===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
          </select>
        </div>
        <div class="fw"><label class="fl">ORDER DATE</label><input type="date" name="orderDate" value="${rec.orderDate||today()}"></div>
        <div class="fw"><label class="fl">EST. ARRIVAL</label><input type="date" name="estArrival" value="${rec.estArrival||''}"></div>
        <div class="fw"><label class="fl">STERN ORDER #</label><input name="sternOrderNum" value="${esc(rec.sternOrderNum||'')}" placeholder="Stern confirmation #"></div>
        <div class="fw"><label class="fl">INV # (linked sale)</label><input name="invNumber" value="${esc(rec.invNumber||'')}" placeholder="e.g. 1492"></div>
        <div class="fw"><label class="fl">TRACKING #</label><input name="trackingNum" value="${esc(rec.trackingNum||'')}" placeholder="Tracking number"></div>
        <div class="fw"><label class="fl">RECEIVED DATE</label><input type="date" name="receivedDate" value="${rec.receivedDate||''}"></div>
      </div>
      <div class="fw" style="margin-bottom:10px"><label class="fl">NOTES</label><textarea name="notes">${esc(rec.notes||'')}</textarea></div>
      ` : `
      <!-- NEW ORDER MODE: multi-line items -->
      <div style="margin-bottom:12px">
        <label class="fl">ORDER DATE</label>
        <input type="date" name="orderDate" value="${today()}" style="width:180px">
      </div>

      <div id="po-lines-wrap">
        <div style="display:grid;grid-template-columns:2fr 1fr 60px auto;gap:8px;align-items:center;margin-bottom:4px;padding:0 4px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em">PART NAME / ID</span>
          <span style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em">PART ID</span>
          <span style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em">QTY</span>
          <span></span>
        </div>
      </div>
      <button type="button" class="btn ghost" style="font-size:12px;margin-bottom:14px" onclick="addPartOrderLine()">+ Add Another Part</button>

      <div class="grid" style="margin-top:4px">
        <div class="fw"><label class="fl">INV # (linked sale)</label><input name="invNumber" value="" placeholder="e.g. 1492"></div>
        <div class="fw"><label class="fl">NOTES</label><input name="notes" placeholder="Any order notes…"></div>
      </div>
      `}

      <div class="br" style="gap:8px;flex-wrap:wrap">
        <button class="btn" type="submit">${partOrderEditing ? 'Save Changes' : '📧 Place Order via Email'}</button>
        ${partOrderEditing ? `<button class="btn ghost" type="button" onclick="partOrderEditing=null;render()">Cancel</button>` : `<button class="btn ghost" type="button" onclick="partOrderEditing=null;render()">Clear</button>`}
        ${partOrderEditing && partOrderEditing.status !== 'received' ? `<button class="btn success" type="button" onclick="markPartOrderReceived('${partOrderEditing.id}')">✅ Mark Received & Add to Inventory</button>` : ''}
      </div>
    </form>
  </div>

  <!-- ORDER LOG -->
  <div class="panel">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
      <h3 style="font-size:13px;font-weight:800;margin:0">Order History</h3>
      <div style="display:flex;gap:6px">
        <button class="btn${partOrderView==='active'?' ':" ghost "}" style="font-size:11px;padding:4px 10px" onclick="partOrderView='active';render()">Active (${DB.partOrders.filter(o=>!['received','cancelled'].includes(o.status)).length})</button>
        <button class="btn${partOrderView==='all'?' ':" ghost "}" style="font-size:11px;padding:4px 10px" onclick="partOrderView='all';render()">All (${DB.partOrders.length})</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>PART NAME</th><th>PART ID</th><th>QTY</th><th>COST</th>
        <th>STATUS</th><th>ORDER DATE</th><th>EST. ARRIVAL</th>
        <th>STERN #</th><th>TRACKING</th><th>INV #</th><th>NOTES</th><th></th>
      </tr></thead>
      <tbody>${orders.length ? orders.map(o => {
        const total = o.qty && o.unitCost ? '$'+(Number(o.qty)*Number(o.unitCost)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
        return `<tr style="${o.status==='received'?'opacity:.6':''}">
          <td style="font-weight:600">${esc(o.itemName)}</td>
          <td class="m" style="font-family:monospace">${esc(o.partId)||'—'}</td>
          <td class="m">${o.qty||1}</td>
          <td>${total}</td>
          <td><span class="badge ${statusBadgeMap[o.status]||'bg-blue'}">${esc(o.status)}</span></td>
          <td class="m">${o.orderDate||'—'}</td>
          <td class="m">${o.estArrival||'—'}</td>
          <td class="m">${esc(o.sternOrderNum)||'—'}</td>
          <td class="m">${o.trackingNum ? `<a href="#" onclick="return false" style="color:var(--accent)">${esc(o.trackingNum)}</a>` : '—'}</td>
          <td class="m">${esc(o.invNumber)||'—'}</td>
          <td class="m" style="font-size:11px;max-width:120px">${esc(o.notes)||'—'}</td>
          <td><div class="ta">
            ${o.status !== 'received' ? `<button class="btn sm success" data-po-id="${o.id}" onclick="markPartOrderReceived(this.dataset.poId)" title="Mark received & add to inventory">✅</button>` : ''}
            <button class="btn sm ghost" data-po-id="${o.id}" onclick="editPartOrderById(this.dataset.poId)">Edit</button>
            <button class="btn sm danger" data-po-id="${o.id}" onclick="delRow('partOrders',this.dataset.poId)">✕</button>
          </div></td>
        </tr>`;
      }).join('') : `<tr><td colspan="12" class="empty">No part orders yet.</td></tr>`}
      </tbody>
    </table></div>
  </div>`;
}

function addPartOrderLine() {
  const wrap = document.getElementById('po-lines-wrap');
  if (!wrap) return;
  const lineNum = wrap.querySelectorAll('.po-line-row').length;
  const knownOptsHtml = '<option value="">— Select known part —</option>' +
    STERN_KNOWN_PARTS.map(p => {
      const g = p.game ? '['+p.game+'] ' : '';
      return `<option value="${esc(p.name)}" data-part-id="${esc(p.id||'')}" data-cost="${p.cost||''}" data-stockstatus="${esc(p.stockStatus||'')}" data-notes="${esc(p.notes||'')}">${g}${esc(p.name)}${p.id?' ('+p.id+')':''}</option>`;
    }).join('');

  const row = document.createElement('div');
  row.className = 'po-line-row';
  row.style.cssText = 'background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:10px';
  row.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 60px auto;gap:8px;align-items:end;margin-bottom:8px">
      <div>
        <label class="fl" style="font-size:10px">PART NAME</label>
        <select class="po-line-select" onchange="onLinePartSelect(this)" style="width:100%">
          ${knownOptsHtml}
        </select>
      </div>
      <div>
        <label class="fl" style="font-size:10px">PART ID</label>
        <input class="po-line-partid" style="font-family:monospace;width:100%" placeholder="auto-filled or custom">
      </div>
      <div>
        <label class="fl" style="font-size:10px">QTY</label>
        <input class="po-line-qty" type="number" min="1" value="1" style="width:100%;text-align:center">
      </div>
      <button type="button" onclick="this.closest('.po-line-row').remove()" style="padding:8px 10px;background:var(--red);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:14px;margin-top:18px">✕</button>
    </div>
    <div class="po-line-info" style="display:none;font-size:11px;padding:5px 8px;background:var(--bg);border-radius:6px;gap:10px;flex-wrap:wrap"></div>
  `;
  wrap.appendChild(row);
}

function onLinePartSelect(sel) {
  const row = sel.closest('.po-line-row');
  if (!row) return;
  const opt = sel.options[sel.selectedIndex];
  const partId = opt.dataset.partId || '';
  const partName = opt.value || '';

  // Fill part ID
  const pidEl = row.querySelector('.po-line-partid');
  if (pidEl) pidEl.value = partId;

  // Show stock + our inventory info
  const infoEl = row.querySelector('.po-line-info');
  if (!infoEl || !partName) { if(infoEl) infoEl.style.display='none'; return; }

  const notes = opt.dataset.notes || '';

  // Look up our own inventory
  const ourPart = (DB.parts||[]).find(p =>
    (partId && (p.partId||'').trim() === partId.trim()) ||
    (p.itemName||'').toLowerCase().trim() === partName.toLowerCase().trim()
  );
  const ourOnHand = ourPart ? (ourPart.onHand !== undefined && ourPart.onHand !== '' ? Number(ourPart.onHand) : (Number(ourPart.startQty||0)+Number(ourPart.addedQty||0)-Number(ourPart.soldQty||0))) : null;

  const parts = [];
  if (ourPart) {
    const color = ourOnHand > 0 ? 'var(--green)' : ourOnHand < 0 ? 'var(--red)' : 'var(--muted)';
    parts.push(`<span>📦 Our stock: <strong style="color:${color}">${ourOnHand}</strong> on hand</span>`);
  } else {
    parts.push(`<span style="color:var(--muted)">📦 Not in our parts inventory yet</span>`);
  }
  if (notes) parts.push(`<span style="color:var(--muted);font-size:11px">${esc(notes)}</span>`);

  infoEl.innerHTML = parts.join(' &nbsp;·&nbsp; ');
  infoEl.style.display = 'flex';

function submitPartOrder(e) {
  e.preventDefault();
  const r = Object.fromEntries(new FormData(e.target));

  if (partOrderEditing) {
    r.qty = parseInt(r.qty) || 1;
    updateRow('partOrders', partOrderEditing.id, r);
    partOrderEditing = null;
    showToast('✅ Order updated');
    render();
    return;
  }

  // ── NEW ORDER: collect all line items from the multi-line form ──
  const lineRows = document.querySelectorAll('.po-line-row');
  if (!lineRows.length) { showToast('Add at least one part to the order.', 'error'); return; }

  const lineItems = [];
  lineRows.forEach(row => {
    const sel   = row.querySelector('.po-line-select');
    const pidEl = row.querySelector('.po-line-partid');
    const qtyEl = row.querySelector('.po-line-qty');
    const name  = sel ? sel.options[sel.selectedIndex]?.value || '' : '';
    const partId = pidEl ? pidEl.value.trim() : '';
    const qty   = parseInt(qtyEl?.value || 1) || 1;
    if (name) lineItems.push({ name, partId, qty });
  });

  if (!lineItems.length) { showToast('Add at least one part to the order.', 'error'); return; }

  // Save each line item as a separate partOrder record
  if (!DB.partOrders) DB.partOrders = [];
  lineItems.forEach(item => {
    const newId = uid();
    DB.partOrders.unshift({
      id: newId, createdAt: today(),
      itemName: item.name,
      partId: item.partId,
      qty: item.qty,
      orderDate: r.orderDate || today(),
      invNumber: r.invNumber || '',
      notes: r.notes || '',
      status: 'ordered',
      sternOrderNum: '', trackingNum: '', estArrival: '', receivedDate: '',
    });
    saveDB('partOrders', newId);
  });

  // ── Build email to Stern ──────────────────────────────────────
  const invNum  = r.invNumber ? `Reference: INV #${r.invNumber}` : '';
  const notes   = r.notes || '';
  const orderDate = r.orderDate || today();

  // Subject: list first part or count
  const subjectPart = lineItems.length === 1
    ? `${lineItems[0].name}${lineItems[0].partId ? ' ('+lineItems[0].partId+')' : ''}`
    : `${lineItems.length} Parts`;
  const subject = `Parts Order — ${subjectPart}`;

  const itemLines = lineItems.map((item, i) =>
    `${i+1}. ${item.name}${item.partId ? '  ('+item.partId+')' : ''}  ×  ${item.qty}`
  ).join('\n');

  const body = [
    `Hello Stern Parts Sales,`,
    ``,
    `Please process the following parts order for San Diego Amusements:`,
    ``,
    `Order Date: ${orderDate}`,
    ``,
    itemLines,
    ``,
    invNum,
    notes ? `Notes: ${notes}` : '',
    ``,
    `Thank you,`,
    `San Diego Amusements`,
  ].filter(l => l !== null && l !== undefined && l !== '').join('\n');

  const gmailUrl = 'https://mail.google.com/mail/?view=cm'
    + '&to=' + encodeURIComponent('Parts.Sales@sternpinball.com')
    + '&su=' + encodeURIComponent(subject)
    + '&body=' + encodeURIComponent(body);

  const a = document.createElement('a');
  a.href = gmailUrl; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

  render();
  showToast(`📧 Gmail opened — ${lineItems.length} part${lineItems.length>1?'s':''} ordered!`);
}

function markPartOrderReceived(id) {
  const order = (DB.partOrders||[]).find(o => o.id === id);
  if (!order) return;
  if (!confirm(`Mark "${order.itemName}" (×${order.qty||1}) as received?\n\nThis will:\n• Set status to Received\n• Add quantity to the matching part in Parts inventory`)) return;

  const ts = new Date().toISOString();
  const receivedDate = today();

  // Update the order status
  const oidx = DB.partOrders.findIndex(o => o.id === id);
  if (oidx !== -1) DB.partOrders[oidx] = {...order, status: 'received', receivedDate, updatedAt: ts};

  // Find matching part in DB.parts by partId or name and increment addedQty
  let matched = false;
  if (order.partId) {
    const pidx = (DB.parts||[]).findIndex(p => (p.partId||'').trim() === order.partId.trim());
    if (pidx !== -1) {
      const p = DB.parts[pidx];
      const newAdded = Number(p.addedQty||0) + Number(order.qty||1);
      const newOnHand = Number(p.startQty||0) + newAdded - Number(p.soldQty||0);
      DB.parts[pidx] = {...p, addedQty: newAdded, onHand: newOnHand, updatedAt: ts};
      matched = true;
      saveDB('parts', p.id);
    }
  }
  if (!matched && order.itemName) {
    const pidx = (DB.parts||[]).findIndex(p => (p.itemName||'').toLowerCase().trim() === order.itemName.toLowerCase().trim());
    if (pidx !== -1) {
      const p = DB.parts[pidx];
      const newAdded = Number(p.addedQty||0) + Number(order.qty||1);
      const newOnHand = Number(p.startQty||0) + newAdded - Number(p.soldQty||0);
      DB.parts[pidx] = {...p, addedQty: newAdded, onHand: newOnHand, updatedAt: ts};
      matched = true;
      saveDB('parts', p.id);
    }
  }

  if (!matched) {
    // Part not in inventory yet — create it
    const newPartId = uid();
    const newPart = {
      id: newPartId, createdAt: today(), updatedAt: ts,
      itemName: order.itemName || '',
      partId: order.partId || '',
      cost: order.unitCost || '',
      startQty: 0,
      addedQty: Number(order.qty||1),
      soldQty: 0,
      onHand: Number(order.qty||1),
      invNumbers: order.invNumber || '',
      notes: `Added via Part Order ${receivedDate}`,
    };
    if (!DB.parts) DB.parts = [];
    DB.parts.unshift(newPart);
    saveDB('parts', newPartId);
    showToast(`✅ "${order.itemName}" received — new part created in Parts inventory`);
  } else {
    showToast(`✅ "${order.itemName}" received — qty updated in Parts inventory`);
  }

  saveDB('partOrders', id);
  partOrderEditing = null;
  render();
}

let wcEditing = null;

function genWarrantyPO(serialNumber) {
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const sn = (serialNumber||'XXXXX').toString().replace(/\s/g,'').toUpperCase();
  return `SDA-${sn}-${yy}${mm}${dd}`;
}

// Returns true if PO looks like an auto-generated value (should be replaced)
function wcPoIsAuto(poVal, serialNumber) {
  if (!poVal) return true;
  if (poVal.includes('XXXXX')) return true;
  // Matches SDA-{ANYTHINGNOSPACES}-{6digits} pattern
  return /^SDA-[A-Z0-9]+-\d{6}$/.test(poVal);
}

function wcSaleSearch(val) {
  if (!val) return;
  const allSales = [...(DB.sold||[]), ...(DB.sales||[])];
  const q = val.trim().toLowerCase();
  // Match against the full datalist label OR any individual field
  const match = allSales.find(r => {
    const label = ((r.machineName||'').toUpperCase()+' — '+(r.customerName||'')+(r.businessName?' · '+r.businessName:'')+(r.serialNumber?' · S/N '+r.serialNumber:'')).toLowerCase();
    return label === q
      || (r.customerName||'').toLowerCase().includes(q)
      || (r.businessName||'').toLowerCase().includes(q)
      || (r.serialNumber||'').toLowerCase().includes(q)
      || (r.machineName||'').toLowerCase().includes(q);
  });
  if (!match) return;
  wcAutoFillFromSaleById(match.id);
}

function wcAutoFillFromSaleById(saleId) {
  if (!saleId) return;
  const allSales = [...(DB.sold||[]), ...(DB.sales||[])];
  const sale = allSales.find(r => r.id === saleId);
  if (!sale) return;
  const setVal = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = val; };
  setVal('wc-gameName', sale.machineName||'');
  setVal('wc-serialNumber', sale.serialNumber||'');
  setVal('wc-shipToName', sale.customerName||'San Diego Amusements');
  const addr = [sale.customerAddress, sale.customerCity, sale.customerState, sale.customerZip].filter(Boolean).join(', ');
  setVal('wc-shipToAddress', addr || '8670 Miramar Rd #A, San Diego, CA 92126');
  setVal('wc-shipToPhone', sale.customerPhone||'858-205-3788');
  const linkEl = document.getElementById('wc-linkedSaleId');
  if (linkEl) linkEl.value = saleId;
  const poEl = document.getElementById('wc-poNumber');
  if (poEl) poEl.value = genWarrantyPO(sale.serialNumber);
  wcUpdateEmailPreview();
}

  const saleId = selectEl.value;
  if (!saleId) return;
  const allSales = [...(DB.sold||[]), ...(DB.sales||[])];

  setVal('wc-gameName', sale.machineName||'');
  setVal('wc-serialNumber', sale.serialNumber||'');
  setVal('wc-shipToName', sale.customerName||'San Diego Amusements');
  const addr = [sale.customerAddress, sale.customerCity, sale.customerState, sale.customerZip].filter(Boolean).join(', ');

  setVal('wc-shipToPhone', sale.customerPhone||'858-205-3788');

function wcSetShipTo(mode) {
  const modeInput = document.getElementById('wc-shipToMode');
  const nameEl    = document.getElementById('wc-shipToName');
  const addrEl    = document.getElementById('wc-shipToAddress');
  const phoneEl   = document.getElementById('wc-shipToPhone');
  const btnCust   = document.getElementById('wc-ship-toggle-cust');
  const btnSda    = document.getElementById('wc-ship-toggle-sda');
  if (!modeInput) return;

  modeInput.value = mode;

  // Update button styles
  if (btnCust) { btnCust.style.background = mode==='customer' ? 'var(--accent)' : 'transparent'; btnCust.style.color = mode==='customer' ? '#fff' : 'var(--muted)'; }
  if (btnSda)  { btnSda.style.background  = mode==='sda'      ? 'var(--accent)' : 'transparent'; btnSda.style.color  = mode==='sda'      ? '#fff' : 'var(--muted)'; }

  if (mode === 'sda') {
    if (nameEl)  nameEl.value  = SDA_ADDRESS.name;
    if (addrEl)  addrEl.value  = SDA_ADDRESS.address;
    if (phoneEl) phoneEl.value = SDA_ADDRESS.phone;

    // Fill from customer fields in the form
    const form = modeInput.closest('form');

    const custName  = (form.querySelector('[name="customerName"]')?.value||'').trim();
    const custAddr  = (form.querySelector('[name="customerAddress"]')?.value||'').trim();
    const custCity  = (form.querySelector('[name="customerCity"]')?.value||'').trim();
    const custState = (form.querySelector('[name="customerState"]')?.value||'').trim();
    const custZip   = (form.querySelector('[name="customerZip"]')?.value||'').trim();
    const custPhone = (form.querySelector('[name="customerPhone"]')?.value||'').trim();
    const fullAddr  = [custAddr, custCity, custState, custZip].filter(Boolean).join(', ');
    if (nameEl)  nameEl.value  = custName  || '';
    if (addrEl)  addrEl.value  = fullAddr  || '';
    if (phoneEl) phoneEl.value = custPhone || '';

  wcUpdateEmailPreview();

function svcOpenGmail(svcId) {
  const g = id => (document.getElementById(id)||{}).value||'';
  // collect line items from DOM
  const lineRows = document.querySelectorAll('.svc-line-row');
  const lineItems = [];
  lineRows.forEach(row => {
    const desc = row.querySelector('.svc-line-desc')?.value||'';
    const amt  = row.querySelector('.svc-line-amt')?.value||'';
    if (desc) lineItems.push({desc,amt});
  });
  const tempRec = {
    ticketNumber: g('svc-ticketNumber'), customerName: g('svc-customerName'),
    businessName: g('svc-businessName'), customerEmail: g('svc-customerEmail'),
    customerPhone: g('svc-customerPhone'), customerAddress: g('svc-customerAddress'),
    customerCity: g('svc-customerCity'), customerState: g('svc-customerState'),
    customerZip: g('svc-customerZip'), machineName: g('svc-machineName'),
    edition: g('svc-edition'), serialNumber: g('svc-serialNumber'),
    issue: g('svc-issue'), techName: g('svc-techName'),
    serviceDate: g('svc-serviceDate'), notes: g('svc-notes'),
    invoiceTo: g('svc-invoiceTo'), dealerNumber: g('svc-dealerNumber'),
    lineItems
  };
  const {to, subject, body} = svcBuildInvoiceEmail(tempRec);
  const url = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(to)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.open(url,'_blank');
  if (svcId) {
    DB.service = (DB.service||[]).map(s => s.id===svcId ? {...s, emailSentDate:today()} : s);
    svcEditing = DB.service.find(s=>s.id===svcId)||svcEditing;
    saveDB(); render();
    showToast('✓ Invoice opened in Gmail','success');
  }
}

function svcAddLine() {
  const container = document.getElementById('svc-line-items');
  if (!container) return;
  const row = document.createElement('div');
  row.className = 'svc-line-row';
  row.style.cssText = 'display:grid;grid-template-columns:1fr 120px 32px;gap:6px;margin-bottom:6px;align-items:center';
  row.innerHTML = '<input class="svc-line-desc" placeholder="Description (labor, part, travel...)" oninput="svcUpdateTotal()" style="margin:0">'+
    '<input class="svc-line-amt" type="number" placeholder="0.00" step="0.01" oninput="svcUpdateTotal()" style="margin:0;text-align:right">'+
    '<button type="button" onclick="this.closest(\'.svc-line-row\').remove();svcUpdateTotal()" style="background:var(--red);color:#fff;border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px">✕</button>';
  container.appendChild(row);
}

function svcUpdateTotal() {
  let total = 0;
  document.querySelectorAll('.svc-line-amt').forEach(el => total += parseFloat(el.value||0));
  const el = document.getElementById('svc-total-display');
  if (el) el.textContent = '$'+total.toFixed(2);
}

function svcSubmit(e) {
  e.preventDefault();
  const f = e.target;
  const r = Object.fromEntries(new FormData(f));
  // collect line items
  const lineItems = [];
  document.querySelectorAll('.svc-line-row').forEach(row => {
    const desc = row.querySelector('.svc-line-desc')?.value||'';
    const amt  = row.querySelector('.svc-line-amt')?.value||'';
    if (desc) lineItems.push({desc,amt});
  });
  r.lineItems = lineItems;
  r.total = lineItems.reduce((s,l)=>s+parseFloat(l.amt||0),0).toFixed(2);
  // invoiceTo and dealerNumber are outside the <form> tag — grab manually
  const _g = id => (document.getElementById(id)||{}).value||'';
  r.invoiceTo   = _g('svc-invoiceTo')   || r.invoiceTo   || 'customer';
  r.dealerNumber= _g('svc-dealerNumber')|| r.dealerNumber|| 'SDA001';
  if (!DB.service) DB.service = [];
  if (svcEditing && svcEditing.id) {
    const updatedRec = {...svcEditing, ...r, updatedAt: new Date().toISOString()};
    DB.service = DB.service.map(x=>x.id===svcEditing.id ? updatedRec : x);
    saveDB('service', svcEditing.id);
    showToast('✓ Service ticket updated');
  } else {
    r.id = Date.now()+'-'+Math.random().toString(36).slice(2,10);
    r.createdAt = today();
    DB.service.push(r);
    saveDB('service', r.id);
    showToast('✓ Service ticket created');
  }
  svcEditing = null;
  render();
}

// Single delegated input listener — set up ONCE at init, never re-added
// This is the ONLY correct way to handle search in re-rendering apps
let _delegatedListenersReady = false;
function _setupDelegatedListeners() {
  if (_delegatedListenersReady) return;
  _delegatedListenersReady = true;
  document.addEventListener('input', function(e) {
    const id = e.target.id;
    if (id === 'inv-search-input') {
      invFilters.search = e.target.value;
      invPage = 0;
      renderInvTable();
    } else if (id === 'ps-search-input') {
      psSearch = e.target.value;
      renderPSTable();
    }
  });
}

// ── SYNC HELPERS ──────────────────────────────────────────────
let _lastSaveTime = 0;

function _updateLastSyncLabel() {
  const el = document.getElementById('last-sync-time');
  if (!el) return;
  const now = new Date();
  el.textContent = 'live • ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

async function forceSyncNow() {
  if (!window._fbUser) { alert('Not signed in.'); return; }

  // Flush any pending local saves before pulling from cloud
  const hasPending = Object.keys(_saveQueue).length > 0 || !!_saveTimer;
  if (hasPending) {
    clearTimeout(_saveTimer);
    _saveTimer = null;
    setSyncStatus('saving', '⟳ Flushing pending saves…');
    try { await pushToDB(); } catch(e) {}
  }

  setSyncStatus('loading', '⟳ Syncing…');
  try {
    const remote = await window._fbLoadAll();
    DB_COLLECTIONS.forEach(col => {
      if (col === '_meta') return; // never overwrite local meta
      if (remote[col] !== undefined) DB[col] = remote[col];
    });
    ensureTables();
    saveLocal();
    render();
    _updateLastSyncLabel();
    setSyncStatus('saved', '✓ Live');
    setTimeout(() => setSyncStatus('idle'), 2000);
  } catch(e) {
    console.warn('[SDA] forceSyncNow error:', e);
    setSyncStatus('error','⚠ Sync failed');
  }
}

async function _startApp(user) {
  // Demo user bypasses the allow-list check
  const allowed = window._fbAllowed || [];
  if (!user.isDemo && allowed.length > 0 && !allowed.includes(user.email)) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0c10;font-family:system-ui,sans-serif;color:#e8eaf0;text-align:center"><div><p style="font-size:32px">🚫</p><p style="margin-top:12px">Access denied for <strong id="denied-email"></strong>.<br>Contact the admin to be added.</p><p style="margin-top:8px;font-size:11px;color:#6b7280">Signed in as: <span id="denied-email2" style="color:#f59e0b"></span></p><button id="denied-signout" style="margin-top:20px;background:#374151;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer">Sign out</button></div></div>`;
    document.getElementById('denied-email').textContent = user.email;
    document.getElementById('denied-email2').textContent = user.email;
    document.getElementById('denied-signout').addEventListener('click', () => window._fbSignOut());
    return;
  }

  // Rebuild app shell (login screen may have replaced body)
  if (!document.getElementById('nav')) {
    document.body.innerHTML = `
    <aside id="sidebar">
      <div class="brand"><span>🕹️ SDA PINBALL<br><span style="font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--muted)">INVENTORY MANAGEMENT</span></span></div>
      <nav id="nav"></nav>

        <div id="user-email" style="font-size:10px;color:#6b7280"></div>
        <button id="signout-btn" onclick="window._fbSignOut()" style="margin-top:6px;background:transparent;border:1px solid #1e2535;color:#6b7280;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit">Sign out</button>
      </div>
    </aside>
    <div id="mob-overlay" onclick="closeMobileMenu()"></div>
    <div class="main">
      <header>
        <button id="mob-menu-btn" onclick="toggleMobileMenu()" aria-label="Menu">☰</button>
        <div class="sw">
          <input type="text" id="gs" placeholder="🔍  Search machines, serials, customers…" oninput="doSearch(this.value)" onfocus="doSearch(this.value)" autocomplete="off">

        <div class="dd" id="ddate" style="display:flex;align-items:center;gap:8px"><span id="ver-inline" style="font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.06em;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.35);border-radius:4px;padding:2px 6px">—</span></div>
      </header>
      <main id="mc"></main>
    </div>`;
    _delegatedListenersReady = false; // reset so listeners rebind on new DOM
  }
  const userEmailEl = document.getElementById('user-email');
  if (userEmailEl) userEmailEl.textContent = user.email;
  const signoutBtn = document.getElementById('signout-btn');
  if (signoutBtn) signoutBtn.style.display = 'block';
  document.getElementById('nav').innerHTML = NAVS.map(([s,icon,label])=>`<button data-s="${s}" onclick="goto('${s}')" class="${s===section?'active':''}">${icon} ${label}</button>`).join('');

  // Demo mode: show banner and block all edits
  if (user && user.isDemo) {
    window.DEMO_MODE = true;
    document.body.classList.add('demo-mode');

    if (!document.getElementById('demo-banner')) {
      const b = document.createElement('div');

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  // If Firebase module hasn't loaded yet, wait for it
  if (!window._fbReady) {
    let waited = 0;
    while (!window._fbReady && waited < 5000) {
      await new Promise(r => setTimeout(r, 100));
      waited += 100;
    }
    if (!window._fbReady) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0c10;color:#ef4444;font-family:system-ui">Firebase failed to load. Check your internet connection and reload the page.</div>';
      return;
    }
  }

  // Check for redirect result first — we use signInWithRedirect for all devices
  // This fires after Google redirects the user back to the app
  if (_auth && _auth.getRedirectResult) {
    try {
      const result = await _auth.getRedirectResult();
      if (result && result.user) {
        await _startApp(result.user);
        return;
      }
    } catch(e) {
      if (e.code !== 'auth/no-auth-event' && e.code !== 'auth/null-user') {
        console.warn('[SDA] Redirect result error:', e.message);
        // Show error on login screen if it's already visible
        const errEl = document.getElementById('login-err');
        if (errEl) errEl.textContent = e.message;
      }
    }
  }

  // Register auth change handler
  window._onAuthChange = async (user) => {
    if (user) {
      await _startApp(user);
    } else {
      _showLoginScreen();
    }
  };

  // If onAuthStateChanged already fired before we set _onAuthChange, handle it now
  if (window._fbPendingAuthUser) {
    const { user } = window._fbPendingAuthUser;
    window._fbPendingAuthUser = null;
    await window._onAuthChange(user);
  } else if (window._fbUser) {
    // onAuthStateChanged already fired and user is signed in — start app directly
    await _startApp(window._fbUser);
  } else {
    // No auth event yet — show login screen
    _showLoginScreen();
  }

  // init complete
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
